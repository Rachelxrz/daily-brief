<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日智识 · Daily Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0b0d;
    --surface:   #111318;
    --border:    #1e2028;
    --gold:      #c9a84c;
    --gold-dim:  #8a6e2f;
    --text:      #e8e2d9;
    --muted:     #6b6860;
    --green:     #4caf82;
    --red:       #e05c5c;
    --amber:     #e09a3c;
    --blue:      #5c9ce0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain overlay ─────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* ── Header ─────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,11,13,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex; align-items: baseline; gap: 0.75rem;
  }
  .logo-cn {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.1rem; font-weight: 600;
    color: var(--gold); letter-spacing: 0.05em;
  }
  .logo-en {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; font-weight: 300;
    color: var(--muted); letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .header-meta {
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.1em; text-align: right;
  }
  .header-meta .live-dot {
    display: inline-block; width: 6px; height: 6px;
    background: var(--green); border-radius: 50%;
    margin-right: 0.4rem;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Layout ──────────────────────────────────── */
  .container {
    max-width: 1400px; margin: 0 auto;
    padding: 2rem;
    position: relative; z-index: 1;
  }

  /* ── Tab nav ─────────────────────────────────── */
  .tab-nav {
    display: flex; gap: 0; margin-bottom: 2rem;
    border: 1px solid var(--border); border-radius: 4px;
    overflow: hidden; width: fit-content;
  }
  .tab-btn {
    background: transparent; border: none; cursor: pointer;
    padding: 0.6rem 1.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    transition: all 0.2s; border-right: 1px solid var(--border);
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active {
    background: var(--gold); color: #0a0b0d; font-weight: 500;
  }
  .tab-btn:hover:not(.active) { color: var(--text); background: var(--surface); }

  /* ── Date selector ──────────────────────────── */
  .date-bar {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 2rem; flex-wrap: wrap;
  }
  .date-label {
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .date-pills {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
  }
  .date-pill {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); border-radius: 3px;
    padding: 0.3rem 0.8rem; font-size: 0.68rem;
    font-family: 'DM Mono', monospace; cursor: pointer;
    transition: all 0.15s; letter-spacing: 0.05em;
  }
  .date-pill.active {
    border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08);
  }
  .date-pill:hover:not(.active) { border-color: var(--muted); color: var(--text); }

  /* ── Content panels ─────────────────────────── */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Report card ─────────────────────────────── */
  .report-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  @media (max-width: 900px) { .report-grid { grid-template-columns: 1fr; } }

  .report-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .report-card-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .report-card-title {
    font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--gold);
  }
  .report-card-lang {
    font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em;
  }
  .report-card-body {
    padding: 1.25rem;
    max-height: 70vh; overflow-y: auto;
  }
  .report-card-body::-webkit-scrollbar { width: 4px; }
  .report-card-body::-webkit-scrollbar-track { background: transparent; }
  .report-card-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Markdown rendering ─────────────────────── */
  .md h1 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--gold); margin-bottom: 0.5rem; font-weight: 400; }
  .md h2 { font-family: 'DM Mono', monospace; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); margin: 1.5rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
  .md h3 { font-family: 'Noto Serif SC', serif; font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; font-weight: 300; }
  .md p { font-size: 0.82rem; line-height: 1.7; color: #c8c2b8; margin-bottom: 0.6rem; }
  .md ul, .md ol { padding-left: 1.2rem; margin-bottom: 0.6rem; }
  .md li { font-size: 0.82rem; line-height: 1.7; color: #c8c2b8; margin-bottom: 0.2rem; }
  .md strong { color: var(--text); font-weight: 500; }
  .md em { color: var(--gold-dim); font-style: italic; }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  .md code { background: rgba(255,255,255,0.06); padding: 0.1em 0.4em; border-radius: 3px; font-size: 0.78rem; color: var(--blue); font-family: 'DM Mono', monospace; }
  .md blockquote { border-left: 2px solid var(--gold-dim); padding-left: 0.8rem; margin: 0.2rem 0 0.6rem 1rem; color: var(--amber); font-style: normal; font-size: 0.76rem; }

  /* Tables */
  .md table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.75rem; }
  .md th { background: rgba(201,168,76,0.08); color: var(--gold); font-weight: 500; padding: 0.5rem 0.75rem; text-align: left; border: 1px solid var(--border); letter-spacing: 0.05em; }
  .md td { padding: 0.45rem 0.75rem; border: 1px solid var(--border); color: #c8c2b8; vertical-align: top; }
  .md tr:hover td { background: rgba(255,255,255,0.02); }

  /* Rating badges */
  .badge-green  { color: var(--green);  font-weight: 500; }
  .badge-yellow { color: var(--amber);  font-weight: 500; }
  .badge-orange { color: #e07a3c;       font-weight: 500; }
  .badge-red    { color: var(--red);    font-weight: 500; }

  /* ── Market monitor single-col ───────────────── */
  .monitor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  @media (max-width: 900px) { .monitor-grid { grid-template-columns: 1fr; } }

  /* ── Empty state ─────────────────────────────── */
  .empty {
    text-align: center; padding: 5rem 2rem;
    color: var(--muted); font-size: 0.8rem; letter-spacing: 0.1em;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }

  /* ── Congress signal cards ──────────────────── */
  .congress-layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1.5rem;
    align-items: start;
  }
  @media (max-width: 1000px) { .congress-layout { grid-template-columns: 1fr; } }

  .congress-summary {
    display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .congress-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.5rem 1rem;
    display: flex; flex-direction: column; gap: 0.15rem;
  }
  .congress-stat-label {
    font-size: 0.6rem; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .congress-stat-value { font-size: 1rem; font-weight: 500; }

  .signal-section-label {
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin: 1rem 0 0.5rem;
  }
  .signal-section-label:first-child { margin-top: 0; }

  .signal-card {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid; border-radius: 6px;
    margin-bottom: 0.6rem; overflow: hidden;
  }
  .signal-card.strong { border-left-color: var(--red); }
  .signal-card.medium { border-left-color: var(--amber); }
  .signal-card.weak   { border-left-color: var(--green); }
  .signal-card-inner  { padding: 0.9rem 1.1rem; }

  .signal-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 0.5rem;
  }
  .signal-member { font-size: 0.82rem; color: var(--text); font-weight: 500; }
  .signal-party  { font-size: 0.62rem; color: var(--muted); margin-top: 0.1rem; }
  .signal-ticker-wrap { text-align: right; }
  .signal-ticker { font-size: 1.05rem; color: var(--gold); font-weight: 500; }
  .signal-action { font-size: 0.62rem; color: var(--muted); }

  .signal-meta {
    font-size: 0.7rem; color: var(--muted); margin-bottom: 0.25rem;
  }
  .signal-comparison {
    font-size: 0.7rem; color: var(--blue);
    background: rgba(92,156,224,0.06);
    padding: 0.25rem 0.5rem; border-radius: 3px;
    margin: 0.3rem 0;
  }
  .signal-score { font-size: 0.62rem; color: var(--gold-dim); text-align: right; }

  .weak-list {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.6rem 0.9rem;
  }
  .weak-item {
    font-size: 0.7rem; color: var(--muted);
    padding: 0.2rem 0; border-bottom: 1px solid var(--border);
  }
  .weak-item:last-child { border-bottom: none; }

  .congress-sidebar { display: flex; flex-direction: column; gap: 1rem; }
  .sidebar-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .sidebar-card-header {
    padding: 0.55rem 1rem; border-bottom: 1px solid var(--border);
    font-size: 0.62rem; color: var(--gold);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .sidebar-card-body { padding: 0.7rem 1rem; }

  .sector-bar-row {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 0.4rem; font-size: 0.7rem;
  }
  .sector-bar-label { width: 58px; color: var(--muted); flex-shrink: 0; }
  .sector-bar-track {
    flex: 1; background: var(--border); border-radius: 2px; height: 4px; overflow: hidden;
  }
  .sector-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; }
  .sector-bar-pct { width: 34px; color: var(--text); text-align: right; flex-shrink: 0; }

  .anti-signal-item {
    font-size: 0.7rem; color: var(--red);
    padding: 0.25rem 0; border-bottom: 1px solid var(--border);
  }
  .anti-signal-item:last-child { border-bottom: none; }
  .sidebar-no-data { font-size: 0.7rem; color: var(--muted); }

  .congress-source-note {
    font-size: 0.6rem; color: var(--muted); margin-top: 0.5rem;
    padding: 0.5rem; border: 1px solid var(--border); border-radius: 3px;
    line-height: 1.5;
  }
  .ai-insight-card {
    display: flex; align-items: flex-start; gap: 0.6rem;
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    border-radius: 6px; padding: 0.7rem 0.9rem; margin-bottom: 0.8rem;
  }
  .ai-insight-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 0.05rem; }
  .ai-insight-text { font-size: 0.78rem; line-height: 1.6; color: var(--fg); }

  /* ── Wheel tab ───────────────────────────────── */
  .wheel-summary { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
  .wheel-stat { background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.7rem 1.1rem; min-width: 110px; text-align: center; }
  .wheel-stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 0.25rem; }
  .wheel-stat-value { font-size: 1.1rem; font-weight: 600; }
  .wheel-layout { display: grid; grid-template-columns: 1fr 340px; gap: 1.2rem; }
  @media (max-width: 900px) { .wheel-layout { grid-template-columns: 1fr; } }
  .wheel-section-label { font-size: 0.62rem; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--muted); margin: 0.8rem 0 0.4rem; }
  .candidate-card { background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
  .candidate-header { display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.35rem; }
  .candidate-ticker { font-size: 1rem; font-weight: 700; color: var(--gold); }
  .candidate-price { font-size: 0.85rem; color: var(--text); font-weight: 600; }
  .candidate-badge { font-size: 0.6rem; background: var(--gold); color: #0a0b0d;
    padding: 0.1rem 0.35rem; border-radius: 3px; font-weight: 600; margin-left: 0.4rem; }
  .candidate-detail { font-size: 0.73rem; color: var(--text); line-height: 1.8; }
  .candidate-detail strong { color: var(--gold); }
  .top-pick-card { border-color: var(--gold) !important; background: rgba(201,168,76,0.06) !important; }
  .top-pick-banner { font-size: 0.62rem; background: var(--gold); color: #0a0b0d;
    padding: 0.15rem 0.5rem; border-radius: 3px 3px 0 0; margin: -0.75rem -1rem 0.5rem;
    font-weight: 700; letter-spacing: 0.05em; }
  .position-card { background: var(--surface); border-radius: 6px; padding: 0.75rem 1rem;
    margin-bottom: 0.5rem; border-left: 3px solid var(--border); }
  .position-card.safe   { border-left-color: var(--green); }
  .position-card.warn   { border-left-color: var(--amber); }
  .position-card.danger { border-left-color: var(--red); }
  .position-header { display: flex; justify-content: space-between; font-size: 0.78rem;
    font-weight: 600; margin-bottom: 0.25rem; }
  .position-meta { font-size: 0.68rem; color: var(--text); line-height: 1.6; }
  .position-advice { font-size: 0.68rem; color: var(--accent); margin-top: 0.2rem; }
  .wheel-source-note { font-size: 0.6rem; color: var(--muted); margin-top: 0.5rem;
    padding: 0.4rem; border: 1px solid var(--border); border-radius: 3px; }

  /* ── Footer ──────────────────────────────────── */
  footer {
    text-align: center; padding: 3rem 2rem;
    color: var(--muted); font-size: 0.62rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    border-top: 1px solid var(--border); margin-top: 3rem;
  }
  footer a { color: var(--gold-dim); text-decoration: none; }
  footer a:hover { color: var(--gold); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-cn">每日智识</span>
    <span class="logo-en">Daily Intelligence</span>
  </div>
  <div class="header-meta">
    <span class="live-dot"></span>
    <span id="last-updated">加载中...</span>
  </div>
</header>

<div class="container">

  <!-- Tab nav -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('news')">📰 每日简报</button>
    <button class="tab-btn" onclick="switchTab('monitor')">📌 结构监控</button>
    <button class="tab-btn" onclick="switchTab('screener')">📈 强势股筛选</button>
    <button class="tab-btn" onclick="switchTab('congress')">🏛 国会信号</button>
    <button class="tab-btn" onclick="switchTab('wheel')">🎡 Wheel</button>
  </div>

  <!-- Date bar -->
  <div class="date-bar">
    <span class="date-label">日期</span>
    <div class="date-pills" id="date-pills"></div>

  <!-- News panel -->
  <div id="panel-news" class="panel active">
    <div id="news-content" class="report-grid">
      <div class="empty"><div class="empty-icon">📰</div>加载中...</div>

  <!-- Monitor panel -->

      <div class="empty"><div class="empty-icon">🎡</div>加载中...</div>

<footer>
  🤖 AI 自动生成 · 每日 08:00 & 09:30 北京时间更新 ·
  <a href="https://github.com" target="_blank">GitHub Actions</a> 驱动

<script>
// ── Simple Markdown renderer ──────────────────────────────
function renderMd(text) {
  if (!text) return '<div class="empty"><div class="empty-icon">📭</div>暂无数据</div>';
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // headings
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // bold/italic
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // hr
    .replace(/^---+$/gm, '<hr>')
    // blockquote
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    // tables
    .replace(/^\|(.+)\|$/gm, (line) => {
      const cells = line.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
      return '<tr>' + cells.map(c => c.trim().match(/^[-:]+$/) ? '' : `<td>${c.trim()}</td>`).join('') + '</tr>';
    })
    // unordered lists
    .replace(/^[\*\-] (.+)$/gm, '<li>$1</li>')
    // ordered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // rating badges
    .replace(/🟢/g, '<span class="badge-green">🟢</span>')
    .replace(/🟡/g, '<span class="badge-yellow">🟡</span>')
    .replace(/🟠/g, '<span class="badge-orange">🟠</span>')
    .replace(/🔴/g, '<span class="badge-red">🔴</span>');

  // Wrap consecutive <tr> in table
  html = html.replace(/(<tr>.*?<\/tr>\n?)+/gs, m => {
    const rows = m.trim().split('\n').filter(r=>r.includes('<td>'));
    if (!rows.length) return m;
    const [header, ...body] = rows;
    const thRow = header.replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>');
    return `<table><thead>${thRow}</thead><tbody>${body.join('')}</tbody></table>`;
  });
  // Wrap consecutive <li> in ul
  html = html.replace(/(<li>.*?<\/li>\n?)+/gs, m => `<ul>${m}</ul>`);
  // Paragraphs: wrap remaining lines
  html = html.split('\n').map(line => {
    line = line.trim();
    if (!line) return '';
    if (line.match(/^<(h[1-6]|ul|ol|li|table|thead|tbody|tr|th|td|blockquote|hr)/)) return line;
    return `<p>${line}</p>`;
  }).join('\n');

  return `<div class="md">${html}</div>`;
}

// ── State ─────────────────────────────────────────────────
let allData = {};
let currentTab = 'news';
let currentDate = null;

// ── Load data.json ─────────────────────────────────────────
async function loadData() {
  try {
    const resp = await fetch('data.json?t=' + Date.now());
    if (!resp.ok) throw new Error('data.json not found');
    allData = await resp.json();
    init();
  } catch(e) {
    // Show demo data if no data.json yet
    allData = getDemoData();
    init();
  }
}

function init() {
  const dates = Object.keys(allData).sort().reverse();
  if (!dates.length) { showEmpty(); return; }

  currentDate = dates[0];

  // Last updated
  document.getElementById('last-updated').textContent =
    '最后更新: ' + (allData[currentDate]?.updated || currentDate);

  // Date pills
  const pills = document.getElementById('date-pills');
  pills.innerHTML = dates.map(d =>
    `<button class="date-pill ${d===currentDate?'active':''}" onclick="selectDate('${d}')">${d}</button>`
  ).join('');

  render();
}

function selectDate(date) {
  currentDate = date;
  document.querySelectorAll('.date-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === date);
  });
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['news','monitor','screener','congress','wheel'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  render();
}

function render() {
  const day = allData[currentDate] || {};

  if (currentTab === 'news')          renderNews(day);
  else if (currentTab === 'congress') renderCongress(day);
  else if (currentTab === 'monitor')  renderMonitor(day);
  else if (currentTab === 'wheel')    renderWheel(day);
}

function renderNews(day) {
  const el = document.getElementById('news-content');
  const news = day.news;
  if (!news || (!news.cn && !news.en)) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>当日无简报数据</div>';
    return;
  }
  const cnContent = news.cn && news.cn.trim() ? news.cn : null;
  const enContent = news.en && news.en.trim() ? news.en : null;
  // If only one version available, show full width
  const gridClass = (cnContent && enContent) ? 'report-grid' : '';
  el.className = gridClass;
  el.innerHTML = `
    ${cnContent ? `
    <div class="report-card">
      <div class="report-card-header">
        <span class="report-card-title">📰 每日智识简报</span>
        <span class="report-card-lang">中文</span>
      </div>
      <div class="report-card-body">${renderMd(cnContent)}</div>
    </div>` : ''}
    ${enContent ? `
    <div class="report-card">
      <div class="report-card-header">
        <span class="report-card-title">📰 Daily Intelligence Brief</span>
        <span class="report-card-lang">English</span>
      </div>
      <div class="report-card-body">${renderMd(enContent)}</div>
    </div>` : ''}
  `;
}

function renderMonitor(day) {
  const el = document.getElementById('monitor-content');
  const mon = day.monitor;
  if (!mon) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>当日无监控数据</div>';
    return;
  }
  el.innerHTML = `
    <div class="report-card">
      <div class="report-card-header">
        <span class="report-card-title">📌 结构监控</span>
        <span class="report-card-lang">中文</span>
      </div>
      <div class="report-card-body">${renderMd(mon.cn)}</div>
    </div>
    <div class="report-card">
      <div class="report-card-header">
        <span class="report-card-title">📌 Market Structure Monitor</span>
        <span class="report-card-lang">English</span>
      </div>
      <div class="report-card-body">${renderMd(mon.en)}</div>
    </div>
  `;
}

function renderCongress(day) {
  const el = document.getElementById('congress-content');
  const c = day.congress;

  if (!c) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🏛</div>当日无国会信号数据</div>';
    return;
  }

  const strong = c.strong || [];
  const medium = c.medium || [];
  const watch  = c.watch  || [];
  const breakdown = c.sector_breakdown || {};
  const allItems = [...strong, ...medium, ...watch];
  const antiSignals = allItems.filter(s => s.comparison && s.comparison.includes('方向相反'));

  // Summary row
  const summary = `
    <div class="congress-summary">
      <div class="congress-stat">
        <span class="congress-stat-label">强信号</span>
        <span class="congress-stat-value" style="color:var(--red)">🔴 ${strong.length}</span>
      </div>
      <div class="congress-stat">
        <span class="congress-stat-label">中等信号</span>
        <span class="congress-stat-value" style="color:var(--amber)">🟡 ${medium.length}</span>
      </div>
      <div class="congress-stat">
        <span class="congress-stat-label">弱信号/观察</span>
        <span class="congress-stat-value" style="color:var(--green)">🟢 ${watch.length}</span>
      </div>
      <div class="congress-stat">
        <span class="congress-stat-label">信号日期</span>
        <span class="congress-stat-value" style="font-size:0.82rem">${c.date || '--'}</span>
      </div>
    </div>`;

  // Signal card builder
  function signalCard(item, tier) {
    const trans = item.transaction === 'Buy' ? '买入' : '卖出';
    return `
      <div class="signal-card ${tier}">
        <div class="signal-card-inner">
          <div class="signal-header">
            <div>
              <div class="signal-member">${item.member}</div>
              <div class="signal-party">${item.party} · ${item.committee} · ${item.chamber}</div>
            </div>
            <div class="signal-ticker-wrap">
              <div class="signal-ticker">${item.ticker}</div>
              <div class="signal-action">${trans} ${item.asset_type}</div>
            </div>
          </div>
          <div class="signal-meta">📅 ${item.trade_date} · 延迟 ${item.delay_days} 天 · ${item.size_range}</div>
          <div class="signal-meta">🏭 ${item.sector || '未知行业'}</div>
          <div class="signal-comparison">${item.comparison || ''}</div>
          ${tier === 'strong' ? `<div class="signal-score">信号强度：${item.score} 分</div>` : ''}
        </div>
      </div>`;
  }

  // Main column
  let mainCol = '';
  if (strong.length) {
    mainCol += '<div class="signal-section-label">🔴 强信号</div>';
    mainCol += strong.map(s => signalCard(s, 'strong')).join('');
  }
  if (medium.length) {
    mainCol += '<div class="signal-section-label">🟡 中等信号</div>';
    mainCol += medium.map(s => signalCard(s, 'medium')).join('');
  }
  if (watch.length) {
    mainCol += '<div class="signal-section-label">🟢 弱信号/观察</div>';
    mainCol += '<div class="weak-list">';
    mainCol += watch.slice(0, 10).map(s => {
      const t = s.transaction === 'Buy' ? '买入' : '卖出';
      return `<div class="weak-item">${s.member} · ${t} <strong>${s.ticker}</strong> · ${s.sector || '未知'}</div>`;
    }).join('');
    if (watch.length > 10) mainCol += `<div class="weak-item" style="color:var(--muted)">...等共 ${watch.length} 条</div>`;
    mainCol += '</div>';
  }
  if (!allItems.length) {
    mainCol = '<div class="empty" style="padding:3rem"><div class="empty-icon">📭</div>本周暂无符合条件的国会交易信号</div>';
  }

  // Sector breakdown
  const bEntries = Object.entries(breakdown).slice(0, 6);
  let sectorHtml = '';
  if (bEntries.length) {
    const maxPct = Math.max(...bEntries.map(([,v]) => v));
    sectorHtml = bEntries.map(([label, pct]) => `
      <div class="sector-bar-row">
        <span class="sector-bar-label">${label}</span>
        <div class="sector-bar-track">
          <div class="sector-bar-fill" style="width:${Math.round(pct / maxPct * 100)}%"></div>
        </div>
        <span class="sector-bar-pct">${pct}%</span>
      </div>`).join('');
  } else {
    sectorHtml = '<div class="sidebar-no-data">暂无买入数据</div>';
  }

  // Anti-signals
  const antiHtml = antiSignals.length
    ? antiSignals.map(s => {
        const t = s.transaction === 'Sell' ? '卖出' : '买入';
        return `<div class="anti-signal-item">⚠️ ${s.member} ${t} ${s.ticker}</div>`;
      }).join('')
    : '<div class="sidebar-no-data">无</div>';

  const aiBlock = c.ai_insight
    ? `<div class="ai-insight-card"><span class="ai-insight-icon">🤖</span><div class="ai-insight-text">${c.ai_insight}</div></div>`
    : '';

  el.innerHTML = summary + aiBlock + `
    <div class="congress-layout">
      <div class="congress-main">${mainCol}</div>
      <div class="congress-sidebar">
        <div class="sidebar-card">
          <div class="sidebar-card-header">📊 本周买入行业分布</div>
          <div class="sidebar-card-body">${sectorHtml}</div>
        </div>
        <div class="sidebar-card">
          <div class="sidebar-card-header">⚠️ 与持仓方向相反</div>
          <div class="sidebar-card-body">${antiHtml}</div>
        </div>
        <div class="sidebar-card" style="margin-top:0.8rem">
          <div class="sidebar-card-header">📐 评分规则</div>
          <div class="sidebar-card-body" style="font-size:0.65rem;line-height:1.8;color:#aaa">
            基础分：期权买入 +3 · 股票买入 +2 · 股票卖出 +1<br>
            加分：高信号议员 +2 · Watchlist标的(买) +2 · 委员会匹配 +1 · 多人同买 +1 · 金额>$50K +1<br>
            减分：披露延迟>45天 −1 · >60天 −2<br>
            <span style="color:var(--red)">强信号 ≥5</span> · <span style="color:var(--amber)">中等 ≥3</span> · <span style="color:var(--green)">观察 ≥1</span>
          </div>
        </div>
        <div class="congress-source-note">
          数据来源：House Stock Watcher 社区镜像<br>
          ⚠️ 参议院数据暂缺 · 信号窗口 14 天 · 仅供参考，不构成投资建议
        </div>
      </div>
    </div>`;
}

function renderWheel(day) {
  const el = document.getElementById('wheel-content');
  const w  = day.wheel;
  if (!w) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🎡</div>当日无 Wheel 数据</div>';
    return;
  }

  const candidates     = w.candidates      || [];
  const callCandidates = w.call_candidates || [];
  const positions      = w.positions       || [];
  const summary        = w.summary         || {};

  // Summary row
  const safe   = positions.filter(p => p.status === '安全').length;
  const warn   = positions.filter(p => p.status === '注意').length;
  const danger = positions.filter(p => p.status === '危险').length;
  const sumHtml = `
    <div class="wheel-summary">
      <div class="wheel-stat">
        <div class="wheel-stat-label">候选数</div>
        <div class="wheel-stat-value">${candidates.length}</div>
      </div>
      <div class="wheel-stat">
        <div class="wheel-stat-label">活跃仓位</div>
        <div class="wheel-stat-value">${positions.length}</div>
      </div>
      <div class="wheel-stat">
        <div class="wheel-stat-label">安全 / 注意 / 危险</div>
        <div class="wheel-stat-value" style="font-size:0.9rem">
          🟢${safe} / 🟡${warn} / 🔴${danger}
        </div>
      </div>
      <div class="wheel-stat">
        <div class="wheel-stat-label">本月已收 Premium</div>
        <div class="wheel-stat-value" style="color:var(--green)">
          $${summary.premium_earned || 0}
        </div>
      </div>
    </div>`;

  // Candidates
  let candidatesHtml = '';
  if (candidates.length) {
    candidatesHtml = candidates.map((c, idx) => {
      const topBanner = idx === 0 ? '<div class="top-pick-banner">🏆 最推荐卖 Put</div>' : '';
      const topClass  = idx === 0 ? ' top-pick-card' : '';
      return `
      <div class="candidate-card${topClass}">
        ${topBanner}
        <div class="candidate-header">
          <div>
            <span class="candidate-ticker">${c.ticker}</span>
            <span class="candidate-badge" style="background:var(--accent);color:#fff">📌 卖 Put</span>
            ${c.congress_signal ? '<span class="candidate-badge">⭐国会信号</span>' : ''}
          </div>
          <span class="candidate-price">$${c.price}</span>
        </div>
        <div class="candidate-detail">
          <strong>Strike $${c.strike}</strong>（OTM ~${((1 - c.strike/c.price)*100).toFixed(0)}%）&nbsp; 到期 ${c.expiry}（${c.dte} 天）&nbsp; IV ${(c.iv*100).toFixed(0)}%<br>
          预估 Premium: <strong>~$${c.premium}/股（$${c.premium_per_contract}/张）</strong><br>
          ADX: <strong>${c.adx}</strong>&nbsp; RSI: <strong>${c.rsi}</strong>
        </div>
      </div>`;
    }).join('');
  } else {
    candidatesHtml = '<div class="empty" style="padding:2rem"><div class="empty-icon">📭</div>今日无符合条件的候选标的</div>';
  }

  // Call Candidates
  let callHtml = '';
  if (callCandidates.length) {
    callHtml = callCandidates.map(c => {
      const unrPct = c.unrealized_pct !== undefined
        ? (c.unrealized_pct >= 0 ? '+' : '') + c.unrealized_pct.toFixed(1) + '%'
        : '--';
      const alreadyBadge = c.already_covered
        ? '<span class="candidate-badge" style="background:#b45309;color:#fff">⚠️ 已有Call仓位</span>'
        : '';
      return `
        <div class="candidate-card">
          <div class="candidate-header">
            <div>
              <span class="candidate-ticker">${c.ticker}</span>
              <span class="candidate-badge" style="background:#6d28d9;color:#fff">📞 卖 Call</span>
              ${alreadyBadge}
            </div>
            <span class="candidate-price">$${c.price}</span>
          </div>
          <div class="candidate-detail">
            持有 <strong>${c.shares} 股</strong>（可卖 ${c.contracts} 张）  成本 $${c.cost_basis}  浮盈 <strong>${unrPct}</strong><br>
            <strong>Strike $${c.strike}</strong>（OTM ~${((c.otm_pct||0)*100).toFixed(0)}%）  到期 ${c.expiry}（${c.dte} 天）  IV ${(c.iv*100).toFixed(0)}%<br>
            预估 Premium: <strong>~$${c.premium}/股（$${(c.premium*100).toFixed(0)}/张）</strong>
          </div>
        </div>`;
    }).join('');
  } else {
    callHtml = '<div class="empty" style="padding:1.5rem"><div class="empty-icon">📭</div>无可用 Covered Call 候选（需持有≥100股）</div>';
  }

  // Positions
  const statusClass = { '安全': 'safe', '注意': 'warn', '危险': 'danger' };
  const statusIcon  = { '安全': '🟢', '注意': '🟡', '危险': '🔴' };
  let posHtml = '';
  if (positions.length) {
    posHtml = positions.map(p => {
      const cls   = statusClass[p.status] || '';
      const icon  = statusIcon[p.status]  || '⚪';
      const ptCn  = p.type.includes('put') ? '卖Put' : '卖Call';
      const sign  = p.dist_pct >= 0 ? '+' : '';
      return `
        <div class="position-card ${cls}">
          <div class="position-header">
            <span>${ptCn} ${p.ticker} $${p.strike}</span>
            <span>${icon} ${p.status}</span>
          </div>
          <div class="position-meta">
            到期: ${p.expiry}（剩 ${p.dte} 天）  当前价 $${p.price}  距Strike ${sign}${p.dist_pct}%
          </div>
          <div class="position-advice">→ ${p.advice}</div>
        </div>`;
    }).join('');
  } else {
    posHtml = '<div class="wheel-source-note">暂无活跃仓位 — 在 watchlist.json 的 wheel_positions 中添加</div>';
  }

  el.innerHTML = sumHtml + `
    <div class="wheel-layout">
      <div>
        <div class="wheel-section-label">📋 今日候选（卖 Put）</div>
        ${candidatesHtml}
        <div class="wheel-section-label" style="margin-top:1.2rem">📞 今日候选（卖 Covered Call）</div>
        ${callHtml}
      </div>
      <div>
        <div class="wheel-section-label">📊 当前持仓</div>
        ${posHtml}
        <div class="wheel-source-note" style="margin-top:0.8rem">
          ⚠️ 仅供参考，不构成投资建议<br>
          Premium 为估算值，实际以市场为准
        </div>
      </div>
    </div>`;
}

function showEmpty() {
  document.getElementById('news-content').innerHTML =
    '<div class="empty"><div class="empty-icon">🌱</div>暂无数据，等待首次运行...</div>';
}

        en: "# 📌 Market Structure Monitor\n\n> Data will be populated after the first GitHub Actions run\n\n---\n\n## 1) 🌪️ Volatility Structure\n- VIX Current Level: --"
      },
      congress: {

        strong: [],
        medium: [],
        watch: [],
        sector_breakdown: {}
      },

        call_candidates: [],
        positions: [],
        summary: { month: today.slice(0,7), premium_earned: 0, positions_closed: 0 }
      }
    }
  };
}
