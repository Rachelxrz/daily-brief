<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日智识 · Daily Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0b0d;
    --surface:   #111318;
    --border:    #1e2028;
    --gold:      #c9a84c;
    --gold-dim:  #8a6e2f;
    --text:      #e8e2d9;
    --muted:     #6b6860;
    --green:     #4caf82;
    --red:       #e05c5c;
    --amber:     #e09a3c;
    --blue:      #79c0ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain overlay ─────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* ── Header ─────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,11,13,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex; align-items: baseline; gap: 0.75rem;
  }
  .logo-cn {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.1rem; font-weight: 600;
    color: var(--gold); letter-spacing: 0.05em;
  }
  .logo-en {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; font-weight: 300;
    color: var(--muted); letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .header-meta {
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.1em; text-align: right;
  }
  .header-meta .live-dot {
    display: inline-block; width: 6px; height: 6px;
    background: var(--green); border-radius: 50%;
    margin-right: 0.4rem;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Layout ──────────────────────────────────── */
  .container {
    max-width: 1400px; margin: 0 auto;
    padding: 2rem;
    position: relative; z-index: 1;
  }

  /* ── Tab nav ─────────────────────────────────── */
  .tab-nav {
    display: flex; gap: 0; margin-bottom: 2rem;
    border: 1px solid var(--border); border-radius: 4px;
    overflow: hidden; width: fit-content;
  }
  .tab-btn {
    background: transparent; border: none; cursor: pointer;
    padding: 0.6rem 1.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    transition: all 0.2s; border-right: 1px solid var(--border);
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active {
    background: var(--gold); color: #0a0b0d; font-weight: 500;
  }
  .tab-btn:hover:not(.active) { color: var(--text); background: var(--surface); }

  /* ── Date selector ──────────────────────────── */
  .date-bar {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 2rem; flex-wrap: wrap;
  }
  .date-label {
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .date-pills {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
  }
  .date-pill {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); border-radius: 3px;
    padding: 0.3rem 0.8rem; font-size: 0.68rem;
    font-family: 'DM Mono', monospace; cursor: pointer;
    transition: all 0.15s; letter-spacing: 0.05em;
  }
  .date-pill.active {
    border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08);
  }
  .date-pill:hover:not(.active) { border-color: var(--muted); color: var(--text); }

  /* ── Content panels ─────────────────────────── */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Language toggle ────────────────────────────── */
  .lang-toggle-bar {
    display: flex; gap: 0.5rem; margin-bottom: 1rem;
  }
  .lang-btn {
    padding: 4px 16px; font-size: 0.7rem; cursor: pointer;
    background: var(--surface); color: var(--muted);
    border: 1px solid var(--border); border-radius: 4px;
    font-family: 'DM Mono', monospace; letter-spacing: 0.08em;
    transition: all 0.15s;
  }
  .lang-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }
  .lang-btn:hover:not(.active) { color: var(--text); border-color: var(--muted); }

  /* ── New candidates (screener) ──────────────────── */
  .new-candidates-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem 1.2rem; margin-bottom: 1rem;
  }
  .new-candidates-header {
    font-size: 0.7rem; color: var(--gold); letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 0.6rem;
  }
  .new-candidate-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: #07261c; border: 1px solid #1a4029;
    border-radius: 5px; padding: 4px 10px; margin: 3px;
    font-size: 0.75rem; cursor: default;
  }
  .new-candidate-chip.breakout { background: #1c1e10; border-color: #3a3508; }

  .new-candidates-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .new-candidate-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 0.75rem; color: var(--text);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .chip-signal { font-size: 0.68rem; color: var(--muted); }

  /* ── Congress overlap tags ──────────────────────── */
  .signal-overlap {
    font-size: 0.68rem; padding: 3px 8px; border-radius: 4px;
    margin-top: 4px; display: inline-block; margin-right: 4px;
  }
  .signal-overlap.direct   { background: #07261c; color: #3fb950; border: 1px solid #1a4029; }
  .signal-overlap.watchlist{ background: #0d1a2d; color: #58a6ff; border: 1px solid #1c3a5e; }
  .signal-overlap.sector   { background: #1c1c2e; color: #a371f7; border: 1px solid #3a3065; }
  .signal-overlap.bullish  { background: #1a1808; color: #e3b341; border: 1px solid #3d3308; }

  /* ── Report card ─────────────────────────────── */
  .report-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  @media (max-width: 900px) { .report-grid { grid-template-columns: 1fr; } }

  .report-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .report-card-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .report-card-title {
    font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--gold);
  }
  .report-card-lang {
    font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em;
  }
  .report-card-body {
    padding: 1.25rem;
    max-height: 70vh; overflow-y: auto;
  }
  .report-card-body::-webkit-scrollbar { width: 4px; }
  .report-card-body::-webkit-scrollbar-track { background: transparent; }
  .report-card-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Markdown rendering ─────────────────────── */
  .md h1 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--gold); margin-bottom: 0.5rem; font-weight: 400; }
  .md h2 { font-family: 'DM Mono', monospace; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); margin: 1.5rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
  .md h3 { font-family: 'Noto Serif SC', serif; font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; font-weight: 300; }
  .md p { font-size: 0.82rem; line-height: 1.7; color: #c8c2b8; margin-bottom: 0.6rem; }
  .md ul, .md ol { padding-left: 1.2rem; margin-bottom: 0.6rem; }
  .md li { font-size: 0.82rem; line-height: 1.7; color: #c8c2b8; margin-bottom: 0.2rem; }
  .md strong { color: var(--text); font-weight: 500; }
  .md a { color: #79c0ff; text-decoration: none; }
  .md a:hover { color: #a8d8ff; text-decoration: underline; }
  .md em { color: var(--gold-dim); font-style: italic; }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  .md code { background: rgba(255,255,255,0.06); padding: 0.1em 0.4em; border-radius: 3px; font-size: 0.78rem; color: var(--blue); font-family: 'DM Mono', monospace; }
  .md blockquote { border-left: 2px solid var(--gold-dim); padding-left: 0.8rem; margin: 0.2rem 0 0.6rem 1rem; color: var(--amber); font-style: normal; font-size: 0.76rem; }

  /* Tables */
  .md table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.75rem; }
  .md th { background: rgba(201,168,76,0.08); color: var(--gold); font-weight: 500; padding: 0.5rem 0.75rem; text-align: left; border: 1px solid var(--border); letter-spacing: 0.05em; }
  .md td { padding: 0.45rem 0.75rem; border: 1px solid var(--border); color: #c8c2b8; vertical-align: top; }
  .md tr:hover td { background: rgba(255,255,255,0.02); }

  /* Rating badges */
  .badge-green  { color: var(--green);  font-weight: 500; }
  .badge-yellow { color: var(--amber);  font-weight: 500; }
  .badge-orange { color: #e07a3c;       font-weight: 500; }
  .badge-red    { color: var(--red);    font-weight: 500; }

  /* ── Market monitor single-col ───────────────── */
  .monitor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }
  @media (max-width: 900px) { .monitor-grid { grid-template-columns: 1fr; } }

  /* ── Empty state ─────────────────────────────── */
  .empty {
    text-align: center; padding: 5rem 2rem;
    color: var(--muted); font-size: 0.8rem; letter-spacing: 0.1em;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }

  /* ── Congress signal cards ──────────────────── */
  .congress-layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 1.5rem;
    align-items: start;
  }
  @media (max-width: 1000px) { .congress-layout { grid-template-columns: 1fr; } }

  .congress-summary {
    display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
  }
  .congress-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.5rem 1rem;
    display: flex; flex-direction: column; gap: 0.15rem;
  }
  .congress-stat-label {
    font-size: 0.6rem; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .congress-stat-value { font-size: 1rem; font-weight: 500; }

  .signal-section-label {
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin: 1rem 0 0.5rem;
  }
  .signal-section-label:first-child { margin-top: 0; }

  .signal-card {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid; border-radius: 6px;
    margin-bottom: 0.6rem; overflow: hidden;
  }
  .signal-card.strong { border-left-color: var(--red); }
  .signal-card.medium { border-left-color: var(--amber); }
  .signal-card.weak   { border-left-color: var(--green); }
  .signal-card-inner  { padding: 0.9rem 1.1rem; }

  .signal-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 0.5rem;
  }
  .signal-member { font-size: 0.82rem; color: var(--text); font-weight: 500; }
  .signal-party  { font-size: 0.62rem; color: var(--muted); margin-top: 0.1rem; }
  .signal-ticker-wrap { text-align: right; }
  .signal-ticker { font-size: 1.05rem; color: var(--gold); font-weight: 500; }
  .signal-action { font-size: 0.62rem; color: var(--muted); }

  .signal-meta {
    font-size: 0.7rem; color: var(--muted); margin-bottom: 0.25rem;
  }
  .signal-comparison {
    font-size: 0.7rem; color: var(--blue);
    background: rgba(92,156,224,0.06);
    padding: 0.25rem 0.5rem; border-radius: 3px;
    margin: 0.3rem 0;
  }
  .signal-score { font-size: 0.62rem; color: var(--gold-dim); text-align: right; }

  .weak-list {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.6rem 0.9rem;
  }
  .weak-item {
    font-size: 0.7rem; color: var(--muted);
    padding: 0.2rem 0; border-bottom: 1px solid var(--border);
  }
  .weak-item:last-child { border-bottom: none; }

  .congress-sidebar { display: flex; flex-direction: column; gap: 1rem; }
  .sidebar-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
  }
  .sidebar-card-header {
    padding: 0.55rem 1rem; border-bottom: 1px solid var(--border);
    font-size: 0.62rem; color: var(--gold);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .sidebar-card-body { padding: 0.7rem 1rem; }

  .sector-bar-row {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 0.4rem; font-size: 0.7rem;
  }
  .sector-bar-label { width: 58px; color: var(--muted); flex-shrink: 0; }
  .sector-bar-track {
    flex: 1; background: var(--border); border-radius: 2px; height: 4px; overflow: hidden;
  }
  .sector-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; }
  .sector-bar-pct { width: 34px; color: var(--text); text-align: right; flex-shrink: 0; }

  .anti-signal-item {
    font-size: 0.7rem; color: var(--red);
    padding: 0.25rem 0; border-bottom: 1px solid var(--border);
  }
  .anti-signal-item:last-child { border-bottom: none; }
  .sidebar-no-data { font-size: 0.7rem; color: var(--muted); }

  .congress-source-note {
    font-size: 0.6rem; color: var(--muted); margin-top: 0.5rem;
    padding: 0.5rem; border: 1px solid var(--border); border-radius: 3px;
    line-height: 1.5;
  }
  .ai-insight-card {
    display: flex; align-items: flex-start; gap: 0.6rem;
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    border-radius: 6px; padding: 0.7rem 0.9rem; margin-bottom: 0.8rem;
  }
  .ai-insight-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 0.05rem; }
  .ai-insight-text { font-size: 0.78rem; line-height: 1.6; color: var(--fg); }

  /* ── Wheel tab ───────────────────────────────── */
  .wheel-summary { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
  .wheel-stat { background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.7rem 1.1rem; min-width: 110px; text-align: center; }
  .wheel-stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 0.25rem; }
  .wheel-stat-value { font-size: 1.1rem; font-weight: 600; }
  .wheel-layout { display: grid; grid-template-columns: 1fr 340px; gap: 1.2rem; }
  @media (max-width: 900px) { .wheel-layout { grid-template-columns: 1fr; } }
  .wheel-section-label { font-size: 0.62rem; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--muted); margin: 0.8rem 0 0.4rem; }
  .candidate-card { background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
  .candidate-header { display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.35rem; }
  .candidate-ticker { font-size: 1rem; font-weight: 700; color: var(--gold); }
  .candidate-price { font-size: 0.85rem; color: var(--text); font-weight: 600; }
  .candidate-badge { font-size: 0.6rem; background: var(--gold); color: #0a0b0d;
    padding: 0.1rem 0.35rem; border-radius: 3px; font-weight: 600; margin-left: 0.4rem; }
  .candidate-detail { font-size: 0.73rem; color: var(--text); line-height: 1.8; }
  .candidate-detail strong { color: var(--gold); }
  .top-pick-card { border-color: var(--gold) !important; background: rgba(201,168,76,0.06) !important; }
  .top-pick-banner { font-size: 0.62rem; background: var(--gold); color: #0a0b0d;
    padding: 0.15rem 0.5rem; border-radius: 3px 3px 0 0; margin: -0.75rem -1rem 0.5rem;
    font-weight: 700; letter-spacing: 0.05em; }
  .position-card { background: var(--surface); border-radius: 6px; padding: 0.75rem 1rem;
    margin-bottom: 0.5rem; border-left: 3px solid var(--border); }
  .position-card.safe   { border-left-color: var(--green); }
  .position-card.warn   { border-left-color: var(--amber); }
  .position-card.danger { border-left-color: var(--red); }
  .position-header { display: flex; justify-content: space-between; font-size: 0.78rem;
    font-weight: 600; margin-bottom: 0.25rem; }
  .position-meta { font-size: 0.68rem; color: var(--text); line-height: 1.6; }
  .position-advice { font-size: 0.68rem; color: var(--accent); margin-top: 0.2rem; }
  .wheel-source-note { font-size: 0.6rem; color: var(--muted); margin-top: 0.5rem;
    padding: 0.4rem; border: 1px solid var(--border); border-radius: 3px; }

  /* ── News card layout (reading.html style) ─── */
  .news-wrap { max-width: 1100px; }

  .news-section { margin-bottom: 2.8rem; }

  .news-section-title {
    font-size: 1.55rem;
    color: var(--gold);
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    margin: 0 0 0.3rem;
    line-height: 1.25;
  }
  .news-section-meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin: 0 0 1rem;
    letter-spacing: 0.04em;
  }

  .news-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px 18px;
    margin-bottom: 14px;
  }

  .news-card-title {
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 7px;
    color: var(--text);
  }
  .news-card-title .rank {
    color: var(--gold-dim);
    font-weight: 400;
    margin-right: 5px;
    font-size: 1rem;
  }
  .news-card-title a {
    color: var(--blue);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
  }
  .news-card-title a:hover { color: #a8d8ff; }

  .news-card-meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: 0.02em;
  }

  .news-analysis-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 4px;
  }
  @media (max-width: 860px) {
    .news-analysis-grid { grid-template-columns: 1fr; }
    .news-card-title { font-size: 1.05rem; }
  }

  .news-analysis-col {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px;
  }
  .news-analysis-label {
    color: var(--muted);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .news-analysis-text {
    font-size: 1.05rem;
    line-height: 1.85;
    color: #c8c2b8;
    white-space: normal;
  }

  /* ── Footer ──────────────────────────────────── */
  footer {
    text-align: center; padding: 3rem 2rem;
    color: var(--muted); font-size: 0.62rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    border-top: 1px solid var(--border); margin-top: 3rem;
  }
  footer a { color: var(--gold-dim); text-decoration: none; }
  footer a:hover { color: var(--gold); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-cn">每日智识</span>
    <span class="logo-en">Daily Intelligence</span>
  </div>
  <div class="header-meta">
    <span class="live-dot"></span>
    <span id="last-updated">加载中...</span>
  </div>
</header>

<div class="container">

  <!-- Tab nav -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('news')">📰 每日简报</button>

<script>
// ── Simple Markdown renderer ──────────────────────────────
function renderMd(text) {
  if (!text) return '<div class="empty"><div class="empty-icon">📭</div>暂无数据</div>';
  // Extract links before escaping so URLs survive & → &amp;
  const linkMap = {};
  let linkIdx = 0;
  text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, (_, label, url) => {
    const key = `\x00LINK${linkIdx++}\x00`;
    linkMap[key] = `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    return key;
  });
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // restore extracted links
    .replace(/\x00LINK(\d+)\x00/g, (_, i) => linkMap[`\x00LINK${i}\x00`])
    // headings
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // bold/italic
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // hr
    .replace(/^---+$/gm, '<hr>')
    // blockquote
    .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
    // tables
    .replace(/^\|(.+)\|$/gm, (line) => {
      const cells = line.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
      return '<tr>' + cells.map(c => c.trim().match(/^[-:]+$/) ? '' : `<td>${c.trim()}</td>`).join('') + '</tr>';
    })
    // unordered lists
    .replace(/^[\*\-] (.+)$/gm, '<li>$1</li>')
    // ordered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // rating badges
    .replace(/🟢/g, '<span class="badge-green">🟢</span>')
    .replace(/🟡/g, '<span class="badge-yellow">🟡</span>')
    .replace(/🟠/g, '<span class="badge-orange">🟠</span>')
    .replace(/🔴/g, '<span class="badge-red">🔴</span>');

  // Wrap consecutive <tr> in table
  html = html.replace(/(<tr>.*?<\/tr>\n?)+/gs, m => {
    const rows = m.trim().split('\n').filter(r=>r.includes('<td>'));
    if (!rows.length) return m;
    const [header, ...body] = rows;
    const thRow = header.replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>');
    return `<table><thead>${thRow}</thead><tbody>${body.join('')}</tbody></table>`;
  });
  // Wrap consecutive <li> in ul
  html = html.replace(/(<li>.*?<\/li>\n?)+/gs, m => `<ul>${m}</ul>`);
  // Paragraphs: wrap remaining lines
  html = html.split('\n').map(line => {
    line = line.trim();
    if (!line) return '';
    if (line.match(/^<(h[1-6]|ul|ol|li|table|thead|tbody|tr|th|td|blockquote|hr)/)) return line;
    return `<p>${line}</p>`;
  }).join('\n');

  return `<div class="md">${html}</div>`;
}

// ── State ─────────────────────────────────────────────────
let allData = {};
let currentTab = 'news';
let currentDate = null;
let currentNewsLang = 'cn';

// ── Load data.json ─────────────────────────────────────────
async function loadData() {
  try {
    const resp = await fetch('data.json?t=' + Date.now());
    if (!resp.ok) throw new Error('data.json not found');
    allData = await resp.json();
    init();
  } catch(e) {
    // Show demo data if no data.json yet
    allData = getDemoData();
    init();
  }
}

function init() {
  const dates = Object.keys(allData).sort().reverse();
  if (!dates.length) { showEmpty(); return; }

  currentDate = dates[0];

  // Last updated
  document.getElementById('last-updated').textContent =
    '最后更新: ' + (allData[currentDate]?.updated || currentDate);

  // Date pills
  const pills = document.getElementById('date-pills');
  pills.innerHTML = dates.map(d =>
    `<button class="date-pill ${d===currentDate?'active':''}" onclick="selectDate('${d}')">${d}</button>`
  ).join('');

  render();
}

function selectDate(date) {
  currentDate = date;
  document.querySelectorAll('.date-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === date);
  });
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['news','monitor','screener','congress','wheel','signals'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  render();
}

function render() {
  const day = allData[currentDate] || {};

  if (currentTab === 'news')          renderNews(day);
  else if (currentTab === 'congress') renderCongress(day);
  else if (currentTab === 'monitor')  renderMonitor(day);
  else if (currentTab === 'screener') renderScreener(day);
  else if (currentTab === 'wheel')    renderWheel(day);
  else if (currentTab === 'signals')  renderSignalAdvisor(day);
}

function setNewsLang(lang) {
  currentNewsLang = lang;
  render();
}

// ── HTML escape helper ────────────────────────────────────
function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Single news card ──────────────────────────────────────
function renderNewsCard(item) {
  const titleLinked = item.url
    ? `<a href="${escHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escHtml(item.title_cn || item.title)}</a>`
    : escHtml(item.title_cn || item.title);

  const enText = escHtml(item.analysis_en || item.title);
  const cnText = escHtml(item.analysis_cn || item.title_cn || '');

  return `
    <div class="news-card">
      <div class="news-card-title">
        <span class="rank">${item.rank}.</span>${titleLinked}
      </div>
      <div class="news-card-meta">${escHtml(item.source)} ｜ ${escHtml(item.time)}</div>
      <div class="news-analysis-grid">
        <div class="news-analysis-col">
          <div class="news-analysis-label">中文</div>
          <div class="news-analysis-text">${cnText}</div>
        </div>
        <div class="news-analysis-col">
          <div class="news-analysis-label">English</div>
          <div class="news-analysis-text">${enText}</div>
        </div>
      </div>
    </div>`;
}

// ── Section definitions ───────────────────────────────────
const NEWS_SECTIONS = [
  { key: 'finance',    label: '📈 金融财经' },
  { key: 'health',     label: '🏥 健康医疗' },
  { key: 'philosophy', label: '🧠 心理·哲学' },
  { key: 'social',     label: '📱 自媒体精选' },
  { key: 'wellness',   label: '🧠 健康·心理·美学' },  // legacy
];

// ── Card-based news rendering ─────────────────────────────
function renderNewsCards(el, cards) {
  let html = '';
  for (const { key, label } of NEWS_SECTIONS) {
    const items = cards[key];
    if (!items || !items.length) continue;
    html += `
      <div class="news-section">
        <h2 class="news-section-title">${label}</h2>
        <p class="news-section-meta">${items.length} 条精选</p>
        ${items.map(renderNewsCard).join('')}
      </div>`;
  }
  if (!html) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>当日无简报数据</div>';
    return;
  }
  el.className = 'news-wrap';
  el.innerHTML = html;
}

// ── Legacy markdown fallback ──────────────────────────────
function renderNewsMarkdown(el, day) {
  const news = day.news;
  if (!news || (!news.cn && !news.en)) {
    el.className = '';
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>当日无简报数据</div>';
    return;
  }
  const cnContent = news.cn && news.cn.trim() ? news.cn : null;
  const enContent = news.en && news.en.trim() ? news.en : null;
  const lang = (currentNewsLang === 'cn' && cnContent) ? 'cn'
             : (currentNewsLang === 'en' && enContent) ? 'en'
             : cnContent ? 'cn' : 'en';
  const content = lang === 'cn' ? cnContent : enContent;
  const title   = lang === 'cn' ? '📰 每日智识简报' : '📰 Daily Intelligence Brief';
  el.className = '';
  el.innerHTML = `
    <div class="lang-toggle-bar">
      <button class="lang-btn ${lang==='cn'?'active':''}" onclick="setNewsLang('cn')">中文</button>
      <button class="lang-btn ${lang==='en'?'active':''}" onclick="setNewsLang('en')">English</button>
    </div>
    <div class="report-card">
      <div class="report-card-header">
        <span class="report-card-title">${title}</span>
        <span class="report-card-lang">${lang==='cn'?'中文':'English'}</span>
      </div>
      <div class="report-card-body">${renderMd(content)}</div>
    </div>`;
}

// ── Main entry: cards first, markdown fallback ────────────
function renderNews(day) {
  const el = document.getElementById('news-content');
  if (day.news_cards && Object.keys(day.news_cards).length > 0) {
    renderNewsCards(el, day.news_cards);
  } else {
    renderNewsMarkdown(el, day);
  }
}

function renderScreener(day) {
  const el = document.getElementById('new-candidates');
  if (!el) return;
  const sa = day.signal_advisor;
  if (!sa || !sa.watchlist) { el.innerHTML = ''; return; }

  // Known holdings tickers (don't show these as "new candidates")
  const holdings = new Set([
    'ADI','ALB','ASML','COHR','COIN','ETN','GEV','GOOG','MPWR','NVDA',
    'VRT','ETHA','GLD','QQQ','SLV','XBI'
  ]);
  const BULLISH = new Set(['💚 强势上涨','🟢 趋势初确认','⚡ 突破关注']);

  const candidates = Object.entries(sa.watchlist)
    .filter(([ticker, d]) => !holdings.has(ticker) && BULLISH.has(d.signal))
    .sort((a, b) => {
      const order = {'⚡ 突破关注': 0, '💚 强势上涨': 1, '🟢 趋势初确认': 2};
      return (order[a[1].signal] ?? 9) - (order[b[1].signal] ?? 9);
    });

  if (!candidates.length) { el.innerHTML = ''; return; }

  const chips = candidates.map(([ticker, d]) => {
    const price = d.price ? `$${d.price.toFixed(0)}` : '';
    return `<span class="new-candidate-chip">${ticker} ${price} <span class="chip-signal">${d.signal}</span></span>`;
  }).join('');

  el.innerHTML = `
    <div class="new-candidates-section">
      <div class="new-candidates-header">🔍 今日新候选（Watchlist 信号变绿，不在持仓）</div>
      <div class="new-candidates-chips">${chips}</div>
    </div>`;
}

function renderMonitor(day) {
  const el = document.getElementById('monitor-content');
  const mon = day.monitor;
  if (!mon) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>当日无监控数据</div>';
    return;
  }
  el.innerHTML = `
    <div class="report-card">
      <div class="report-card-header">
        <span class="report-card-title">📌 结构监控</span>
        <span class="report-card-lang">中文</span>
      </div>
      <div class="report-card-body">${renderMd(mon.cn)}</div>
    </div>
    <div class="report-card">
      <div class="report-card-header">
        <span class="report-card-title">📌 Market Structure Monitor</span>
        <span class="report-card-lang">English</span>
      </div>
      <div class="report-card-body">${renderMd(mon.en)}</div>
    </div>
  `;
}

function renderCongress(day) {
  const el = document.getElementById('congress-content');
  let c = day.congress;

  // Fallback: if current day has no congress data, find the latest day that does
  const hasCongressData = (obj) => obj && (
    (obj.strong && obj.strong.length > 0) ||
    (obj.medium && obj.medium.length > 0) ||
    (obj.watch  && obj.watch.length  > 0)
  );

  if (!hasCongressData(c)) {
    const allDates = Object.keys(allData).sort().reverse();
    for (const d of allDates) {
      if (hasCongressData(allData[d].congress)) {
        c = allData[d].congress;
        const note = document.createElement('div');
        note.style.cssText = 'font-size:0.68rem;color:var(--muted);margin-bottom:0.8rem;padding:0.4rem 0.8rem;background:rgba(255,255,255,0.03);border-radius:6px;border:1px solid var(--border)';
        note.textContent = `⚠️ 当日无国会数据，显示最近有效数据（${d}）`;
        el.innerHTML = '';
        el.appendChild(note);
        break;
      }
    }
  }

  if (!hasCongressData(c)) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🏛</div>暂无国会信号数据（14天内无记录）</div>';
    return;
  }

  const strong = c.strong || [];
  const medium = c.medium || [];
  const watch  = c.watch  || [];
  const breakdown = c.sector_breakdown || {};
  const allItems = [...strong, ...medium, ...watch];
  const antiSignals = allItems.filter(s => s.comparison && s.comparison.includes('方向相反'));

  // Summary row
  const summary = `
    <div class="congress-summary">
      <div class="congress-stat">
        <span class="congress-stat-label">强信号</span>
        <span class="congress-stat-value" style="color:var(--red)">🔴 ${strong.length}</span>
      </div>
      <div class="congress-stat">
        <span class="congress-stat-label">中等信号</span>
        <span class="congress-stat-value" style="color:var(--amber)">🟡 ${medium.length}</span>
      </div>
      <div class="congress-stat">
        <span class="congress-stat-label">弱信号/观察</span>
        <span class="congress-stat-value" style="color:var(--green)">🟢 ${watch.length}</span>
      </div>
      <div class="congress-stat">
        <span class="congress-stat-label">信号日期</span>
        <span class="congress-stat-value" style="font-size:0.82rem">${c.date || '--'}</span>
      </div>
    </div>`;

  // Overlap detection data
  const HOLDINGS_SET = new Set([
    'ADI','ALB','ASML','COHR','COIN','ETN','GEV','GOOG','MPWR','NVDA',
    'VRT','ETHA','GLD','QQQ','SLV','XBI'
  ]);
  const WATCHLIST_SET = new Set([
    'ALB','ANET','AVGO','BDRY','CEG','CIEN','COHR','COPX','ETHA','FRO',
    'GEV','GS','HEWJ','LITE','MP','NEE','NVDA','PLTR','PWR','VRT','VST',
    'MPWR','ADI','GOOG','NBIS','MPC'
  ]);
  const SECTOR_HOLDINGS = {
    '科技':   ['QQQ','GOOG','NVDA'],
    '半导体': ['ADI','COHR','MPWR','NVDA'],
    '能源':   ['GLD','SLV'],
    '工业':   ['GEV','ETN','VRT'],
    '医疗':   ['XBI'],
    '金融':   ['COIN','GS'],
  };
  const sa = day.signal_advisor;
  const saWatchlist = (sa && sa.watchlist) ? sa.watchlist : {};
  const BULLISH_SET = new Set(['💚 强势上涨','🟢 趋势初确认','⚡ 突破关注']);

  // Signal card builder
  function signalCard(item, tier) {
    const trans = item.transaction === 'Buy' ? '买入' : '卖出';
    const ticker = item.ticker;
    // Build overlap tags
    let overlapTags = '';
    if (HOLDINGS_SET.has(ticker)) {
      overlapTags += `<span class="signal-overlap direct">🔗 直接持仓</span>`;
    }
    if (WATCHLIST_SET.has(ticker) && !HOLDINGS_SET.has(ticker)) {
      overlapTags += `<span class="signal-overlap watchlist">📌 Watchlist</span>`;
    }
    // Sector resonance
    const itemSector = item.sector || '';
    for (const [sec, tickers] of Object.entries(SECTOR_HOLDINGS)) {
      if (itemSector.includes(sec)) {
        overlapTags += `<span class="signal-overlap sector">🏦 行业重叠: ${tickers.slice(0,2).join('/')}</span>`;
        break;
      }
    }
    // Technical signal resonance
    if (saWatchlist[ticker] && BULLISH_SET.has(saWatchlist[ticker].signal)) {
      overlapTags += `<span class="signal-overlap bullish">⚡ 技术共振: ${saWatchlist[ticker].signal}</span>`;
    }
    const overlapBlock = overlapTags ? `<div style="margin-top:6px">${overlapTags}</div>` : '';
    return `
      <div class="signal-card ${tier}">
        <div class="signal-card-inner">
          <div class="signal-header">
            <div>
              <div class="signal-member">${item.member}</div>
              <div class="signal-party">${item.party} · ${item.committee} · ${item.chamber}</div>
            </div>
            <div class="signal-ticker-wrap">
              <div class="signal-ticker">${ticker}</div>
              <div class="signal-action">${trans} ${item.asset_type}</div>
            </div>
          </div>
          <div class="signal-meta">📅 ${item.trade_date} · 延迟 ${item.delay_days} 天 · ${item.size_range}</div>
          <div class="signal-meta">🏭 ${itemSector || '未知行业'}</div>
          <div class="signal-comparison">${item.comparison || ''}</div>
          ${tier === 'strong' ? `<div class="signal-score">信号强度：${item.score} 分</div>` : ''}
          ${overlapBlock}
        </div>
      </div>`;
  }

  // Main column
  let mainCol = '';
  if (strong.length) {
    mainCol += '<div class="signal-section-label">🔴 强信号</div>';
    mainCol += strong.map(s => signalCard(s, 'strong')).join('');
  }
  if (medium.length) {
    mainCol += '<div class="signal-section-label">🟡 中等信号</div>';
    mainCol += medium.map(s => signalCard(s, 'medium')).join('');
  }
  if (watch.length) {
    mainCol += '<div class="signal-section-label">🟢 弱信号/观察</div>';
    mainCol += '<div class="weak-list">';
    mainCol += watch.slice(0, 10).map(s => {
      const t = s.transaction === 'Buy' ? '买入' : '卖出';
      return `<div class="weak-item">${s.member} · ${t} <strong>${s.ticker}</strong> · ${s.sector || '未知'}</div>`;
    }).join('');
    if (watch.length > 10) mainCol += `<div class="weak-item" style="color:var(--muted)">...等共 ${watch.length} 条</div>`;
    mainCol += '</div>';
  }
  if (!allItems.length) {
    mainCol = '<div class="empty" style="padding:3rem"><div class="empty-icon">📭</div>本周暂无符合条件的国会交易信号</div>';
  }

  // Sector breakdown
  const bEntries = Object.entries(breakdown).slice(0, 6);
  let sectorHtml = '';
  if (bEntries.length) {
    const maxPct = Math.max(...bEntries.map(([,v]) => v));
    sectorHtml = bEntries.map(([label, pct]) => `
      <div class="sector-bar-row">
        <span class="sector-bar-label">${label}</span>
        <div class="sector-bar-track">
          <div class="sector-bar-fill" style="width:${Math.round(pct / maxPct * 100)}%"></div>
        </div>
        <span class="sector-bar-pct">${pct}%</span>
      </div>`).join('');
  } else {
    sectorHtml = '<div class="sidebar-no-data">暂无买入数据</div>';
  }

  // Anti-signals
  const antiHtml = antiSignals.length
    ? antiSignals.map(s => {
        const t = s.transaction === 'Sell' ? '卖出' : '买入';
        return `<div class="anti-signal-item">⚠️ ${s.member} ${t} ${s.ticker}</div>`;
      }).join('')
    : '<div class="sidebar-no-data">无</div>';

  const aiBlock = c.ai_insight
    ? `<div class="ai-insight-card"><span class="ai-insight-icon">🤖</span><div class="ai-insight-text">${c.ai_insight}</div></div>`
    : '';

  el.innerHTML = summary + aiBlock + `
    <div class="congress-layout">
      <div class="congress-main">${mainCol}</div>
      <div class="congress-sidebar">
        <div class="sidebar-card">
          <div class="sidebar-card-header">📊 本周买入行业分布</div>
          <div class="sidebar-card-body">${sectorHtml}</div>
        </div>
        <div class="sidebar-card">
          <div class="sidebar-card-header">⚠️ 与持仓方向相反</div>
          <div class="sidebar-card-body">${antiHtml}</div>
        </div>
        <div class="sidebar-card" style="margin-top:0.8rem">
          <div class="sidebar-card-header">📐 评分规则</div>
          <div class="sidebar-card-body" style="font-size:0.65rem;line-height:1.8;color:#aaa">
            基础分：期权买入 +3 · 股票买入 +2 · 股票卖出 +1<br>
            加分：高信号议员 +2 · Watchlist标的(买) +2 · 委员会匹配 +1 · 多人同买 +1 · 金额>$50K +1<br>
            减分：披露延迟>45天 −1 · >60天 −2<br>
            <span style="color:var(--red)">强信号 ≥5</span> · <span style="color:var(--amber)">中等 ≥3</span> · <span style="color:var(--green)">观察 ≥1</span>
          </div>
        </div>
        <div class="congress-source-note">
          数据来源：House Stock Watcher 社区镜像<br>
          ⚠️ 参议院数据暂缺 · 信号窗口 14 天 · 仅供参考，不构成投资建议
        </div>
      </div>
    </div>`;
}

function renderWheel(day) {
  const el = document.getElementById('wheel-content');
  const w  = day.wheel;
  if (!w) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🎡</div>当日无 Wheel 数据</div>';
    return;
  }

  const candidates     = w.candidates      || [];
  const callCandidates = w.call_candidates || [];
  const positions      = w.positions       || [];
  const summary        = w.summary         || {};

  // Summary row
  const safe   = positions.filter(p => p.status === '安全').length;
  const warn   = positions.filter(p => p.status === '注意').length;
  const danger = positions.filter(p => p.status === '危险').length;
  const sumHtml = `
    <div class="wheel-summary">
      <div class="wheel-stat">
        <div class="wheel-stat-label">候选数</div>
        <div class="wheel-stat-value">${candidates.length}</div>
      </div>
      <div class="wheel-stat">
        <div class="wheel-stat-label">活跃仓位</div>
        <div class="wheel-stat-value">${positions.length}</div>
      </div>
      <div class="wheel-stat">
        <div class="wheel-stat-label">安全 / 注意 / 危险</div>
        <div class="wheel-stat-value" style="font-size:0.9rem">
          🟢${safe} / 🟡${warn} / 🔴${danger}
        </div>
      </div>
      <div class="wheel-stat">
        <div class="wheel-stat-label">本月已收 Premium</div>
        <div class="wheel-stat-value" style="color:var(--green)">
          $${summary.premium_earned || 0}
        </div>
      </div>
    </div>`;

  // 计算年化收益率，合并排序，取 Top 3
  const annYield = (c) => ((c.premium / c.price) * (365 / Math.max(c.dte, 1)) * 100);
  const putMeta  = candidates.map(c => ({...c, _type:'put',  _label:'卖 Put',  _color:'var(--accent)', _emoji:'📌', _yield: annYield(c)}));
  const callMeta = callCandidates.map(c => ({...c, _type:'call', _label:'卖 Call', _color:'#6d28d9',       _emoji:'📞', _yield: annYield(c)}));
  const top3     = [...putMeta, ...callMeta].sort((a,b) => b._yield - a._yield).slice(0, 3);
  const medals   = ['🥇','🥈','🥉'];

  const top3Html = top3.length === 0
    ? '<div class="empty" style="padding:1.5rem"><div class="empty-icon">📭</div>今日无候选标的</div>'
    : top3.map((c, i) => {
        const isCall = c._type === 'call';
        const unrStr = isCall && c.unrealized_pct != null
          ? (c.unrealized_pct>=0?'+':'')+c.unrealized_pct.toFixed(1)+'%' : '--';
        const detail = isCall
          ? `持有 <strong>${c.shares}股</strong>&nbsp; 成本 $${c.cost_basis}&nbsp; 浮盈 <strong>${unrStr}</strong><br>
             <strong>Strike $${c.strike}</strong>（OTM ~+${(c.otm_pct||0).toFixed(0)}%）&nbsp; 到期 ${c.expiry}（${c.dte} 天）&nbsp; IV ${(c.iv*100).toFixed(0)}%<br>
             预估 Premium: <strong>~$${c.premium}/股（$${c.premium_per_contract}/张）</strong>`
          : `<strong>Strike $${c.strike}</strong>（OTM ~${((1-c.strike/c.price)*100).toFixed(0)}%）&nbsp; 到期 ${c.expiry}（${c.dte} 天）&nbsp; IV ${(c.iv*100).toFixed(0)}%<br>
             预估 Premium: <strong>~$${c.premium}/股（$${c.premium_per_contract}/张）</strong><br>
             ADX: <strong>${c.adx}</strong>&nbsp; RSI: <strong>${c.rsi}</strong>`;
        const topCls = i === 0 ? ' top-pick-card' : '';
        const banner = i === 0 ? '<div class="top-pick-banner">🏆 综合最优 · 年化 Premium 最高</div>' : '';
        return `<div class="candidate-card${topCls}">
          ${banner}
          <div class="candidate-header">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:1rem">${medals[i]}</span>
              <span class="candidate-ticker">${c.ticker}</span>
              <span class="candidate-badge" style="background:${c._color};color:#fff">${c._emoji} ${c._label}</span>
              ${c.congress_signal?'<span class="candidate-badge">⭐国会信号</span>':''}
              ${c.already_covered?'<span class="candidate-badge" style="background:#b45309;color:#fff">⚠️ 已有Call</span>':''}
            </div>
            <div style="text-align:right;flex-shrink:0">
              <span class="candidate-price">$${c.price}</span>
              <div style="font-size:0.62rem;color:var(--green);font-weight:600;margin-top:2px">年化 ~${c._yield.toFixed(0)}%</div>
            </div>
          </div>
          <div class="candidate-detail">${detail}</div>
        </div>`;
      }).join('');

  // 原有 Put / Call 详细列表
  let candidatesHtml = '';
  if (candidates.length) {
    candidatesHtml = candidates.map(c => `
      <div class="candidate-card">
        <div class="candidate-header">
          <div>
            <span class="candidate-ticker">${c.ticker}</span>
            <span class="candidate-badge" style="background:var(--accent);color:#fff">📌 卖 Put</span>
            ${c.congress_signal ? '<span class="candidate-badge">⭐国会信号</span>' : ''}
          </div>
          <span class="candidate-price">$${c.price}</span>
        </div>
        <div class="candidate-detail">
          <strong>Strike $${c.strike}</strong>（OTM ~${((1 - c.strike/c.price)*100).toFixed(0)}%）&nbsp; 到期 ${c.expiry}（${c.dte} 天）&nbsp; IV ${(c.iv*100).toFixed(0)}%<br>
          预估 Premium: <strong>~$${c.premium}/股（$${c.premium_per_contract}/张）</strong><br>
          ADX: <strong>${c.adx}</strong>&nbsp; RSI: <strong>${c.rsi}</strong>
        </div>
      </div>`).join('');
  } else {
    candidatesHtml = '<div class="empty" style="padding:1.5rem"><div class="empty-icon">📭</div>今日无符合条件的候选标的</div>';
  }

  // Call Candidates
  let callHtml = '';
  if (callCandidates.length) {
    callHtml = callCandidates.map(c => {
      const unrPct = c.unrealized_pct !== undefined
        ? (c.unrealized_pct >= 0 ? '+' : '') + c.unrealized_pct.toFixed(1) + '%'
        : '--';
      const alreadyBadge = c.already_covered
        ? '<span class="candidate-badge" style="background:#b45309;color:#fff">⚠️ 已有Call仓位</span>'
        : '';
      return `
        <div class="candidate-card">
          <div class="candidate-header">
            <div>
              <span class="candidate-ticker">${c.ticker}</span>
              <span class="candidate-badge" style="background:#6d28d9;color:#fff">📞 卖 Call</span>
              ${alreadyBadge}
            </div>
            <span class="candidate-price">$${c.price}</span>
          </div>
          <div class="candidate-detail">
            持有 <strong>${c.shares} 股</strong>（可卖 ${c.contracts} 张）  成本 $${c.cost_basis}  浮盈 <strong>${unrPct}</strong><br>
            <strong>Strike $${c.strike}</strong>（OTM ~${((c.otm_pct||0)*100).toFixed(0)}%）  到期 ${c.expiry}（${c.dte} 天）  IV ${(c.iv*100).toFixed(0)}%<br>
            预估 Premium: <strong>~$${c.premium}/股（$${(c.premium*100).toFixed(0)}/张）</strong>
          </div>
        </div>`;
    }).join('');
  } else {
    callHtml = '<div class="empty" style="padding:1.5rem"><div class="empty-icon">📭</div>无可用 Covered Call 候选（需持有≥100股）</div>';
  }

  // Positions
  const statusClass = { '安全': 'safe', '注意': 'warn', '危险': 'danger' };
  const statusIcon  = { '安全': '🟢', '注意': '🟡', '危险': '🔴' };
  let posHtml = '';
  if (positions.length) {
    posHtml = positions.map(p => {
      const cls   = statusClass[p.status] || '';
      const icon  = statusIcon[p.status]  || '⚪';
      const ptCn  = p.type.includes('put') ? '卖Put' : '卖Call';
      const sign  = p.dist_pct >= 0 ? '+' : '';
      return `
        <div class="position-card ${cls}">
          <div class="position-header">
            <span>${ptCn} ${p.ticker} $${p.strike}</span>
            <span>${icon} ${p.status}</span>
          </div>
          <div class="position-meta">
            到期: ${p.expiry}（剩 ${p.dte} 天）  当前价 $${p.price}  距Strike ${sign}${p.dist_pct}%
          </div>
          <div class="position-advice">→ ${p.advice}</div>
        </div>`;
    }).join('');
  } else {
    posHtml = '<div class="wheel-source-note">暂无活跃仓位 — 在 watchlist.json 的 wheel_positions 中添加</div>';
  }

  el.innerHTML = sumHtml + `
    <div class="wheel-section-label">🏆 Top 3 综合推荐（按年化 Premium 排序）</div>
    ${top3Html}
    <div class="wheel-layout" style="margin-top:1.2rem">
      <div>
        <div class="wheel-section-label">📋 全部候选（卖 Put）</div>
        ${candidatesHtml}
        <div class="wheel-section-label" style="margin-top:1.2rem">📞 全部候选（卖 Covered Call）</div>
        ${callHtml}
      </div>
      <div>
        <div class="wheel-section-label">📊 当前持仓</div>
        ${posHtml}
        <div class="wheel-source-note" style="margin-top:0.8rem">
          ⚠️ 仅供参考，不构成投资建议<br>
          Premium 为估算值，实际以市场为准
        </div>
      </div>
    </div>`;
}

// ── Signal Advisor ────────────────────────────────────────────────────────
function renderSignalAdvisor(day) {
  const el = document.getElementById('signals-content');
  const sa = day.signal_advisor;
  if (!sa) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>当日无技术信号数据</div>';
    return;
  }

  const sess    = sa.session === 'pre_market' ? '盘前' : '盘后';
  const regular = sa.regular_account || {};
  const ira     = sa.ira_account     || {};
  const wl      = sa.watchlist       || {};
  const opts    = sa.option_recommendations || [];

  const SIG_META = {
    '💚 强势上涨':   {bg:'#0d2016', color:'#3fb950', border:'#1a4029'},
    '🟢 趋势初确认': {bg:'#071a10', color:'#56d364', border:'#0d3520'},
    '⚡ 突破关注':   {bg:'#1c1e10', color:'#e3b341', border:'#3a3508'},
    '🟡 震荡整理':   {bg:'#161203', color:'#d29922', border:'#2d2502'},
    '🟠 走弱观察':   {bg:'#1e1305', color:'#e09a3c', border:'#3d2208'},
    '🔴 强烈看跌':   {bg:'#2d1215', color:'#f85149', border:'#5a1e22'},
    '⚪ 数据不足':   {bg:'#161b22', color:'#6b6860', border:'#30363d'},
  };

  const REC_COLOR = {
    'LEAP':       {bg:'#07261c', color:'#3fb950', label:'LEAP'},
    'MID_TERM':   {bg:'#07161f', color:'#58a6ff', label:'中期'},
    'NO_ACTION':  {bg:'#161b22', color:'#6b6860', label:'观望'},
  };

  function signalBadge(sig) {
    const m = SIG_META[sig] || SIG_META['⚪ 数据不足'];
    return `<span style="background:${m.bg};color:${m.color};border:1px solid ${m.border};
      padding:2px 7px;border-radius:4px;font-size:0.7rem;white-space:nowrap">${sig}</span>`;
  }

  function recBadge(rec) {
    const m = REC_COLOR[rec] || REC_COLOR['NO_ACTION'];
    return `<span style="background:${m.bg};color:${m.color};padding:2px 7px;
      border-radius:4px;font-size:0.65rem;font-weight:600">${m.label}</span>`;
  }

  function pnlColor(pct) {
    if (pct == null) return 'inherit';
    return pct >= 0 ? 'var(--green)' : 'var(--red)';
  }

  function buildHoldingRows(accountObj) {
    const entries = Object.entries(accountObj);
    if (!entries.length) return '<div class="empty" style="padding:1rem">暂无持仓</div>';
    const ORDER = ['💚 强势上涨','🟢 趋势初确认','⚡ 突破关注','🟡 震荡整理','🟠 走弱观察','🔴 强烈看跌','⚪ 数据不足'];
    entries.sort((a,b) => ORDER.indexOf(a[1].signal) - ORDER.indexOf(b[1].signal));
    return entries.map(([ticker, d]) => {
      const st    = d.supertrend || {};
      const adx   = d.adx       || {};
      const sqz   = d.sqzmom    || {};
      const opt   = d.option_rec || {};
      const dir   = st.direction === 'UP' ? '↑' : '↓';
      const flip  = st.bars_since_flip <= 5 ? `<span style="color:var(--muted);font-size:0.65rem">(${st.bars_since_flip}根)</span>` : '';
      const near  = st.near_flip ? '⚡' : '';
      const sqzMap = {SQUEEZE:'SQZ🔴', RELEASED:'SQZ🟢出', NO_SQUEEZE:'SQZ🟢'};
      const sqzS  = sqzMap[sqz.sqz_state] || '';
      const momMap = {INCREASING:'↑', DECREASING:'↓', FLIPPING:'⇄'};
      const momS  = momMap[sqz.momentum_dir] || '';
      const pnl   = d.unrealized_pnl_pct;
      const pnlS  = pnl != null ? `<span style="color:${pnlColor(pnl)};font-size:0.75rem">${pnl>=0?'+':''}${pnl.toFixed(1)}%</span>` : '';
      const rec   = opt.recommendation || 'NO_ACTION';
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:8px 6px;font-weight:600;white-space:nowrap">${ticker}</td>
        <td style="padding:8px 6px;color:var(--text)">$${(d.price||0).toFixed(2)}</td>
        <td style="padding:8px 6px">${signalBadge(d.signal || '⚪ 数据不足')}</td>
        <td style="padding:8px 6px;font-size:0.8rem;white-space:nowrap">
          <span style="color:${st.direction==='UP'?'var(--green)':'var(--red)'}">ST${dir}</span>${flip}${near}
        </td>
        <td style="padding:8px 6px;font-size:0.8rem;white-space:nowrap">${sqzS}${momS}</td>
        <td style="padding:8px 6px;font-size:0.8rem;white-space:nowrap">
          ADX${adx.adx||'?'} <span style="color:var(--green)">DI+${adx.di_pos||'?'}</span>/<span style="color:var(--red)">DI-${adx.di_neg||'?'}</span>
        </td>
        <td style="padding:8px 6px">${pnlS}</td>
        <td style="padding:8px 6px">${recBadge(rec)}</td>
        <td style="padding:8px 6px;font-size:0.75rem;color:var(--muted);max-width:180px">${d.action||''}</td>
      </tr>`;
    }).join('');
  }

  function buildWlRows(wlObj) {
    const entries = Object.entries(wlObj);
    if (!entries.length) return '';
    const BULL = ['💚 强势上涨','🟢 趋势初确认','⚡ 突破关注'];
    const BEAR = ['🔴 强烈看跌','🟠 走弱观察'];
    const bullE  = entries.filter(([,d]) => BULL.includes(d.signal));
    const bearE  = entries.filter(([,d]) => BEAR.includes(d.signal));
    const otherE = entries.filter(([,d]) => !BULL.includes(d.signal) && !BEAR.includes(d.signal));

    function miniRow(ticker, d) {
      const st = d.supertrend || {};
      const dir = st.direction === 'UP' ? '↑' : '↓';
      return `<span style="display:inline-flex;align-items:center;gap:4px;
        background:var(--surface);border:1px solid var(--border);
        border-radius:5px;padding:3px 8px;margin:3px;font-size:0.75rem;white-space:nowrap">
        <strong>${ticker}</strong>
        <span style="color:${st.direction==='UP'?'var(--green)':'var(--red)'}">ST${dir}</span>
        ${signalBadge(d.signal||'⚪ 数据不足')}
      </span>`;
    }

    let html = '';
    if (bullE.length) {
      html += `<div style="margin-bottom:0.6rem">
        <div style="font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">强势 — 可关注建仓</div>
        <div>${bullE.map(([t,d]) => miniRow(t,d)).join('')}</div></div>`;
    }
    if (otherE.length) {
      html += `<div style="margin-bottom:0.6rem">
        <div style="font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">震荡等待</div>
        <div>${otherE.map(([t,d]) => miniRow(t,d)).join('')}</div></div>`;
    }
    if (bearE.length) {
      html += `<div>
        <div style="font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">走弱回避</div>
        <div>${bearE.map(([t,d]) => miniRow(t,d)).join('')}</div></div>`;
    }
    return html;
  }

  function buildOptRows(optArr) {
    if (!optArr.length) return '<div class="empty" style="padding:1rem">暂无期权建议</div>';
    const leaps = optArr.filter(o => o.recommendation === 'LEAP');
    const mids  = optArr.filter(o => o.recommendation === 'MID_TERM');
    let html = '';
    if (leaps.length) {
      html += `<div style="margin-bottom:0.8rem">
        <div style="font-size:0.7rem;color:var(--muted);letter-spacing:0.08em;margin-bottom:6px">LEAP（12-18个月 ITM call，Delta 0.70-0.80）</div>
        ${leaps.map(o => `<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:0.8rem">
          ✅ <strong>${o.ticker}</strong> — ${o.rationale||''}
          ${o.suggested_expiry ? `<br><span style="color:var(--muted);font-size:0.7rem;margin-left:1.2em">到期 ${o.suggested_expiry}，Delta ${o.suggested_delta||''}${o.max_position_cost?'，上限 $'+(o.max_position_cost||0).toLocaleString():''}</span>` : ''}
        </div>`).join('')}
      </div>`;
    }
    if (mids.length) {
      html += `<div>
        <div style="font-size:0.7rem;color:var(--muted);letter-spacing:0.08em;margin-bottom:6px">中期期权（3-6个月，Delta 0.50-0.65）</div>
        ${mids.map(o => `<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:0.8rem">
          ✅ <strong>${o.ticker}</strong> — ${o.rationale||''}
          ${o.suggested_expiry ? `<br><span style="color:var(--muted);font-size:0.7rem;margin-left:1.2em">到期 ${o.suggested_expiry}，Delta ${o.suggested_delta||''}${o.max_position_cost?'，上限 $'+(o.max_position_cost||0).toLocaleString():''}</span>` : ''}
        </div>`).join('')}
      </div>`;
    }
    return html;
  }

  const tableStyle = `width:100%;border-collapse:collapse;font-size:0.8rem`;
  const thStyle    = `padding:6px 6px;text-align:left;font-size:0.65rem;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid var(--border);
    white-space:nowrap`;

  el.innerHTML = `
    <div style="margin-bottom:1rem;font-size:0.75rem;color:var(--muted)">
      ${sa.date} · ${sess} · <span style="color:var(--gold)">技术信号 v1.1</span>
    </div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:1.2rem;margin-bottom:1rem">
      <div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;
        letter-spacing:0.1em;margin-bottom:0.8rem">🏦 普通账户持仓信号</div>
      <div style="overflow-x:auto">
        <table style="${tableStyle}">
          <thead><tr>
            <th style="${thStyle}">股票</th>
            <th style="${thStyle}">价格</th>
            <th style="${thStyle}">信号</th>
            <th style="${thStyle}">Supertrend</th>
            <th style="${thStyle}">SQZ</th>
            <th style="${thStyle}">ADX / DI</th>
            <th style="${thStyle}">浮盈亏</th>
            <th style="${thStyle}">期权</th>
            <th style="${thStyle}">操作建议</th>
          </tr></thead>
          <tbody>${buildHoldingRows(regular)}</tbody>
        </table>
      </div>
    </div>

    ${Object.keys(ira).length ? `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:1.2rem;margin-bottom:1rem">
      <div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;
        letter-spacing:0.1em;margin-bottom:0.8rem">🏦 IRA 账户持仓信号</div>
      <div style="overflow-x:auto">
        <table style="${tableStyle}">
          <thead><tr>
            <th style="${thStyle}">股票</th><th style="${thStyle}">价格</th>
            <th style="${thStyle}">信号</th><th style="${thStyle}">Supertrend</th>
            <th style="${thStyle}">SQZ</th><th style="${thStyle}">ADX / DI</th>
            <th style="${thStyle}">浮盈亏</th><th style="${thStyle}">期权</th>
            <th style="${thStyle}">操作建议</th>
          </tr></thead>
          <tbody>${buildHoldingRows(ira)}</tbody>
        </table>
      </div>
    </div>` : ''}

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:1.2rem;margin-bottom:1rem">
      <div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;
        letter-spacing:0.1em;margin-bottom:0.8rem">📋 期权建议（IRA 优先）</div>
      ${buildOptRows(opts)}
    </div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:1.2rem;margin-bottom:1rem">
      <div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;
        letter-spacing:0.1em;margin-bottom:0.8rem">👀 Watchlist 信号扫描</div>
      ${buildWlRows(wl)}
    </div>

    <div style="font-size:0.7rem;color:var(--muted);text-align:center;padding:0.5rem 0">
      ⚠️ 仅供参考，不构成投资建议 · 盘前数据为前日收盘价
    </div>`;
}
