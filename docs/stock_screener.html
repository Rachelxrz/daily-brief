<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日强势股筛选</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 20px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: 0.02em;
    }
    .header .subtitle {
      font-size: 0.8rem;
      color: #8b949e;
      margin-top: 4px;
    }

    /* Sector performance bar */
    .sector-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
      margin-bottom: 24px;
    }
    .sector-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .sector-card .name {
      font-size: 0.7rem;
      color: #8b949e;
      margin-bottom: 4px;
    }
    .sector-card .pct {
      font-size: 1rem;
      font-weight: 700;
    }
    .positive { color: #3fb950; }
    .negative { color: #f85149; }

    /* Top stocks */
    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .stock-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .stock-card.rank-1 { border-left: 3px solid #ffd700; }
    .stock-card.rank-2 { border-left: 3px solid #c0c0c0; }
    .stock-card.rank-3 { border-left: 3px solid #cd7f32; }

    .rank-badge {
      font-size: 1.1rem;
      font-weight: 800;
      color: #8b949e;
      width: 24px;
      text-align: center;
    }

    .stock-info .symbol {
      font-size: 1rem;
      font-weight: 700;
      color: #e6edf3;
    }
    .stock-info .sector-tag {
      display: inline-block;
      font-size: 0.65rem;
      background: #21262d;
      color: #8b949e;
      border-radius: 4px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .stock-info .ma-row {
      font-size: 0.7rem;
      color: #8b949e;
      margin-top: 4px;
    }
    .ma-pill {
      display: inline-block;
      background: #0d3019;
      color: #3fb950;
      border-radius: 4px;
      padding: 1px 5px;
      margin-right: 3px;
      font-size: 0.65rem;
    }

    .stock-perf {
      text-align: right;
    }
    .stock-perf .day-chg {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .stock-perf .price {
      font-size: 0.75rem;
      color: #8b949e;
      margin-top: 2px;
    }

    /* Screener config summary */
    .config-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 20px;
    }
    .config-box .config-title {
      font-size: 0.75rem;
      color: #58a6ff;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .config-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .config-item {
      font-size: 0.7rem;
      color: #8b949e;
    }
    .config-item span {
      color: #e6edf3;
      font-weight: 600;
    }

    .footer {
      text-align: center;
      font-size: 0.65rem;
      color: #484f58;
      margin-top: 20px;
    }

    .loading { text-align: center; color: #8b949e; padding: 40px; }
    .error   { text-align: center; color: #f85149; padding: 20px; }
  </style>
</head>
<body>

<div class="header">
  <h1>📈 每日强势股筛选</h1>
  <div class="subtitle" id="updated-at">加载中...</div>
</div>

<div id="sector-section">
  <div class="section-title">🔄 今日板块表现</div>
  <div class="sector-grid" id="sector-grid">
    <div class="loading">加载中...</div>
  </div>
</div>

<div class="section-title" style="margin-top:8px">🏆 TOP 强势股（均线多头 + Screener过滤）</div>
<div id="stocks-container">
  <div class="loading">加载中...</div>
</div>

<div class="config-box">
  <div class="config-title">⚙️ Screener 条件</div>
  <div class="config-row" id="config-row">
    <div class="config-item">价格 ≥ <span>$100</span></div>
    <div class="config-item">市值 ≥ <span>$15B</span></div>
    <div class="config-item">成交量 ≥ <span>300,000</span></div>
    <div class="config-item">EPS ≥ <span>0.25</span></div>
    <div class="config-item">收盘 > MA25 <span>+0.1%</span></div>
    <div class="config-item">收盘 > MA50 <span>+0.2%</span></div>
    <div class="config-item">收盘 > MA125 <span>+0.7%</span></div>
  </div>
</div>

<div class="footer" id="footer">数据来源: Yahoo Finance &nbsp;|&nbsp; 仅供参考，不构成投资建议</div>

<script>
  const RANK_LABELS = ['🥇','🥈','🥉'];

  async function loadData() {
    try {
      const res = await fetch('./data/stock_screener.json?t=' + Date.now());
      if (!res.ok) throw new Error('数据文件未找到');
      const data = await res.json();
      render(data.latest);
    } catch(e) {
      document.getElementById('stocks-container').innerHTML =
        `<div class="error">⚠️ 暂无数据 (${e.message})<br><small>数据将在每个交易日收盘后自动更新</small></div>`;
      document.getElementById('sector-grid').innerHTML = '';
    }
  }

  function pctColor(v) {
    return v >= 0 ? 'positive' : 'negative';
  }
  function pctStr(v) {
    return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  }

  function render(report) {
    if (!report) return;

    // Header
    document.getElementById('updated-at').textContent =
      '更新时间: ' + (report.generated_at || report.date);

    // Sector grid
    const sectorGrid = document.getElementById('sector-grid');
    sectorGrid.innerHTML = '';
    const perf = report.sector_performance || {};
    const leading = Object.keys(report.leading_sectors || {});
    Object.entries(perf)
      .sort((a,b) => b[1]-a[1])
      .forEach(([name, pct]) => {
        const isLeading = leading.includes(name);
        sectorGrid.innerHTML += `
          <div class="sector-card" style="${isLeading ? 'border:1px solid #3fb950;' : ''}">
            <div class="name">${name}${isLeading ? ' 🔥' : ''}</div>
            <div class="pct ${pctColor(pct)}">${pctStr(pct)}</div>
          </div>`;
      });

    // Top stocks
    const container = document.getElementById('stocks-container');
    container.innerHTML = '';
    const stocks = report.top_stocks || [];
    if (stocks.length === 0) {
      container.innerHTML = '<div class="loading">今日无股票通过筛选条件</div>';
      return;
    }

    stocks.forEach((s, i) => {
      const ma25  = s.pct_above_ma25  != null ? `MA25 +${s.pct_above_ma25.toFixed(1)}%`  : '';
      const ma50  = s.pct_above_ma50  != null ? `MA50 +${s.pct_above_ma50.toFixed(1)}%`  : '';
      const ma125 = s.pct_above_ma125 != null ? `MA125 +${s.pct_above_ma125.toFixed(1)}%` : '';

      container.innerHTML += `
        <div class="stock-card rank-${i+1}">
          <div class="rank-badge">${RANK_LABELS[i] || '#'+(i+1)}</div>
          <div class="stock-info">
            <div>
              <span class="symbol">${s.symbol}</span>
              <span class="sector-tag">${s.sector}</span>
            </div>
            <div class="ma-row">
              ${ma25  ? `<span class="ma-pill">${ma25}</span>`  : ''}
              ${ma50  ? `<span class="ma-pill">${ma50}</span>`  : ''}
              ${ma125 ? `<span class="ma-pill">${ma125}</span>` : ''}
              ${s.eps != null ? `<span style="color:#8b949e;font-size:0.65rem">EPS $${s.eps.toFixed(2)}</span>` : ''}
            </div>
          </div>
          <div class="stock-perf">
            <div class="day-chg ${pctColor(s.day_change_pct)}">${pctStr(s.day_change_pct)}</div>
            <div class="price">$${s.price}</div>
          </div>
        </div>`;
    });
  }

  loadData();
</script>
</body>
</html>
