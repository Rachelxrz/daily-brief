name: 📰 每日智识简报 + 📌 市场结构监控

on:
  # ─── 自动定时触发 ────────────────────────────────────────
  schedule:
    # 每天 00:00 UTC = 08:00 北京时间：每日新闻简报
    - cron: '0 0 * * *'
    # 每天 01:30 UTC = 09:30 北京时间：市场开盘后结构监控（仅工作日）
    - cron: '30 1 * * 1-5'

  # ─── 手动触发（用于测试）────────────────────────────────
  workflow_dispatch:
    inputs:
      job_type:
        description: '选择要执行的任务'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - news_only
          - market_only
      dry_run:
        description: 'Dry run（不推送，仅查看输出）'
        required: false
        default: 'false'
        type: boolean

# ─── 公共 Secrets ─────────────────────────────────────────
env:
  WECOM_WEBHOOK_URL:   ${{ secrets.WECOM_WEBHOOK_URL }}
  WXPUSHER_APP_TOKEN:  ${{ secrets.WXPUSHER_APP_TOKEN }}
  WXPUSHER_UIDS:       ${{ secrets.WXPUSHER_UIDS }}
  SERVERCHAN_SENDKEY:  ${{ secrets.SERVERCHAN_SENDKEY }}
  ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  # ════════════════════════════════════════════════════════
  #  JOB 1: 每日新闻简报（每天 08:00 北京时间）
  # ════════════════════════════════════════════════════════
  daily-news-brief:
    name: 📰 每日新闻简报
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'both' || github.event.inputs.job_type == 'news_only'))

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📁 Create logs directory
        run: mkdir -p logs

      - name: 🚀 Run daily news brief
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: 📋 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-brief-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

  # ════════════════════════════════════════════════════════
  #  JOB 2: 市场结构监控（工作日 09:30 北京时间）
  # ════════════════════════════════════════════════════════
  market-structure-monitor:
    name: 📌 市场结构监控
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 1 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'both' || github.event.inputs.job_type == 'market_only'))

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📁 Create logs directory
        run: mkdir -p logs

      - name: 📌 Run market structure monitor
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python market_monitor.py --dry-run
          else
            python market_monitor.py
          fi

      - name: 📋 Upload market monitor logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-monitor-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
