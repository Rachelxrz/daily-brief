name: Daily Brief + Market Monitor

on:
  schedule:
    - cron: '0 13 * * *'       # 08:00 ET - News brief (daily)
    - cron: '30 14 * * 1-5'    # 09:30 ET - Market monitor (weekdays)
    - cron: '0 23 * * *'       # 18:00 ET - Evening news brief (daily)
    - cron: '30 23 * * 1-5'    # 18:30 ET - Evening market monitor (weekdays)
    - cron: '30 20 * * 1-5'    # 16:30 ET - Congress signal (weekdays, post-market)
    - cron: '0 13 * * 1-5'     # 08:00 ET - Wheel Strategy scan (weekdays, pre-market)
    - cron: '0 12 * * 1-5'     # 08:00 ET - Signal Advisor pre-market (weekdays)
    - cron: '30 21 * * 1-5'    # 17:30 ET - Signal Advisor post-market (weekdays)
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Job to run'
        required: true
        default: 'both'
        type: choice
        options: [both, news_only, market_only, congress_only, wheel_only, signal_pre, signal_post]
      dry_run:
        description: 'Dry run (no push)'
        required: false
        default: 'false'
        type: boolean

env:
  WECOM_WEBHOOK_URL:      ${{ secrets.WECOM_WEBHOOK_URL }}
  WXPUSHER_APP_TOKEN:     ${{ secrets.WXPUSHER_APP_TOKEN }}
  WXPUSHER_UIDS:          ${{ secrets.WXPUSHER_UIDS }}
  SERVERCHAN_SENDKEY:     ${{ secrets.SERVERCHAN_SENDKEY }}
  ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
  LAMBDA_FINANCE_TOKEN:   ${{ secrets.LAMBDA_FINANCE_TOKEN }}

jobs:

  daily-news-brief:
    name: Daily News Brief
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      (github.event_name == 'schedule' && (github.event.schedule == '0 13 * * *' || github.event.schedule == '0 23 * * *')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'both' || github.event.inputs.job_type == 'news_only'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p logs docs

      - name: Run daily news brief
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit & push web data
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/data.json /tmp/new_data.json
          git fetch origin main
          git reset --hard origin/main
          python merge_data.py /tmp/new_data.json docs/data.json
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Daily news brief $(date +'%Y-%m-%d')"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

  market-monitor:
    name: Market Structure Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      (github.event_name == 'schedule' && (github.event.schedule == '30 14 * * 1-5' || github.event.schedule == '30 23 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'both' || github.event.inputs.job_type == 'market_only'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p logs docs

      - name: Run market structure monitor
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python market_monitor.py --dry-run
          else
            python market_monitor.py
          fi

      - name: Commit & push web data
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/data.json /tmp/new_data.json
          git fetch origin main
          git reset --hard origin/main
          python merge_data.py /tmp/new_data.json docs/data.json
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Market monitor $(date +'%Y-%m-%d')"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

  congress-signal:
    name: 🏛 国会交易信号
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 20 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'both' || github.event.inputs.job_type == 'congress_only'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p logs docs docs/data

      - name: Run congress tracker
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python congress_tracker.py --dry-run
          else
            python congress_tracker.py
          fi

      - name: Commit & push web data
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/data.json /tmp/new_data.json
          [ -f docs/data/congress_seen.json ] && cp docs/data/congress_seen.json /tmp/congress_seen.json || true
          git fetch origin main
          git reset --hard origin/main
          python merge_data.py /tmp/new_data.json docs/data.json
          [ -f /tmp/congress_seen.json ] && cp /tmp/congress_seen.json docs/data/congress_seen.json || true
          git add docs/data.json docs/data/congress_seen.json
          git diff --staged --quiet || git commit -m "congress_tracker $(date +'%Y-%m-%d')"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: congress-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

  update-status:
    name: ⚙️ Update PROJECT_STATUS
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [daily-news-brief, market-monitor]
    if: always() && github.event.inputs.dry_run != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0          # 需要完整 git 历史来生成变更日志

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh status
        run: python update_status.py

      - name: Commit & push status
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp PROJECT_STATUS.md /tmp/PROJECT_STATUS.md
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/PROJECT_STATUS.md PROJECT_STATUS.md
          git add PROJECT_STATUS.md
          git diff --staged --quiet || git commit -m "Update PROJECT_STATUS $(date +'%Y-%m-%d')"
          git push

  wheel-strategy:
    name: 🎡 Wheel Strategy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 13 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'both' || github.event.inputs.job_type == 'wheel_only'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p logs docs docs/data

      - name: Run wheel strategy
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python wheel_strategy.py --dry-run
          else
            python wheel_strategy.py
          fi

      - name: Commit & push web data
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/data.json /tmp/new_data.json
          git fetch origin main
          git reset --hard origin/main
          python merge_data.py /tmp/new_data.json docs/data.json
          git add docs/data.json
          git diff --staged --quiet || git commit -m "wheel_strategy $(date +'%Y-%m-%d')"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wheel-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

  signal-advisor-premarket:
    name: 📊 技术信号（盘前）
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_type == 'signal_pre')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p logs docs

      - name: Run signal advisor (pre-market)
        run: python signal_advisor.py --session pre

      - name: Commit & push web data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/data.json /tmp/new_data.json
          git fetch origin main
          git reset --hard origin/main
          python merge_data.py /tmp/new_data.json docs/data.json
          git add docs/data.json
          git diff --staged --quiet || git commit -m "signal_advisor_pre $(date +'%Y-%m-%d')"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-pre-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

  signal-advisor-postmarket:
    name: 📊 技术信号（盘后）
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '30 21 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job_type == 'signal_post')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p logs docs

      - name: Run signal advisor (post-market)
        run: python signal_advisor.py --session post

      - name: Commit & push web data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/data.json /tmp/new_data.json
          git fetch origin main
          git reset --hard origin/main
          python merge_data.py /tmp/new_data.json docs/data.json
          git add docs/data.json
          git diff --staged --quiet || git commit -m "signal_advisor_post $(date +'%Y-%m-%d')"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-post-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
