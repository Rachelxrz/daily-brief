name: Daily Brief + Market Monitor

on:
  schedule:
    - cron: '0 13 * * *'       # 08:00 ET - News brief (daily)
    - cron: '30 14 * * 1-5'    # 09:30 ET - Market monitor (weekdays)
    - cron: '0 23 * * *'       # 18:00 ET - Evening news brief (daily)
    - cron: '30 23 * * 1-5'    # 18:30 ET - Evening market monitor (weekdays)
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Job to run'
        required: true
        default: 'both'
        type: choice
        options: [both, news_only, market_only]
      dry_run:
        description: 'Dry run (no push)'
        required: false
        default: 'false'
        type: boolean

env:
  WECOM_WEBHOOK_URL:    ${{ secrets.WECOM_WEBHOOK_URL }}
  WXPUSHER_APP_TOKEN:   ${{ secrets.WXPUSHER_APP_TOKEN }}
  WXPUSHER_UIDS:        ${{ secrets.WXPUSHER_UIDS }}
  SERVERCHAN_SENDKEY:   ${{ secrets.SERVERCHAN_SENDKEY }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}

jobs:

  daily-news-brief:
    name: Daily News Brief
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      (github.event_name == 'schedule' && (github.event.schedule == '0 13 * * *' || github.event.schedule == '0 23 * * *')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'both' || github.event.inputs.job_type == 'news_only'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p logs docs

      - name: Run daily news brief
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit & push web data
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/data.json /tmp/data.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/data.json docs/data.json
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Daily news brief $(date +'%Y-%m-%d')"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

  market-monitor:
    name: Market Structure Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      (github.event_name == 'schedule' && (github.event.schedule == '30 14 * * 1-5' || github.event.schedule == '30 23 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'both' || github.event.inputs.job_type == 'market_only'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p logs docs

      - name: Run market structure monitor
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python market_monitor.py --dry-run
          else
            python market_monitor.py
          fi

      - name: Commit & push web data
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/data.json /tmp/data.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/data.json docs/data.json
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Market monitor $(date +'%Y-%m-%d')"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
